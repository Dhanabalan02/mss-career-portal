<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // Check if the user is visiting the root port or domain
        if (window.location.pathname === '/' || window.location.pathname === '/mss-career-portal' || window.location.pathname === '/mss-career-portal/') {
            window.location.replace('/mss-career-portal/home');
        }
    </script>
</head>
<body>
    <p>If you are not redirected automatically, <a href="/mss-career-portal/home">click here</a>.</p>
</body>
</html>
