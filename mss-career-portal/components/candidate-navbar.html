<script>
  // Logic to set Active link properly
  (function () {
    var path = window.location.pathname.toLowerCase();
    var links = document.querySelectorAll('#mainMenu .nav-link-premium');
    links.forEach(function (link) {
      link.classList.remove('active');
      let href = link.getAttribute('href').toLowerCase();
      // simple check for pathname matching
      if ((path.includes('home') || path.endsWith('/')) && href.includes('home')) {
        link.classList.add('active');
      } else if (path.includes('jobs') && href.includes('jobs')) {
        link.classList.add('active');
      } else if (path.includes('job-detail') && href.includes('jobs')) {
        link.classList.add('active');
      }
    });
  })();
</script>
