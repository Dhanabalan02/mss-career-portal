<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signing in — MSS Career Portal</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0F172A;
            font-family: 'Rubik', sans-serif;
            color: #F1F5F9;
        }
        .msg {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59,130,246,0.2);
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg p { color: #64748B; font-size: 0.9rem; margin: 0; }
        .msg h3 { margin: 0 0 0.5rem; font-size: 1.1rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="msg">
        <div class="spinner"></div>
        <h3>Signing you in…</h3>
        <p>You will be redirected shortly.</p>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token');
            var userType = params.get('user_type');
            var name = params.get('name');
            var userId = params.get('user_id');
            var email = params.get('email');

            if (!token) {
                document.querySelector('h3').textContent = 'Sign-in failed';
                document.querySelector('p').textContent = 'No token received. Please try again.';
                document.querySelector('.spinner').style.display = 'none';
                setTimeout(function () { window.location.href = '/mss-career-portal/home'; }, 3000);
                return;
            }

            localStorage.setItem('access_token', token);
            localStorage.setItem('user_type', userType || 'candidate');
            localStorage.setItem('user_name', name || '');
            localStorage.setItem('user_id', userId || '');
            localStorage.setItem('user_email', email || '');

            window.location.href = '/mss-career-portal/home';
        })();
    </script>
</body>
</html>
