<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Roles - MSS Careers</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/projects/mss-career-portal/assets/css/style.css" rel="stylesheet">
</head>

<body style="background-color: var(--bg-body);">

    <div id="candidate-navbar"></div>

    <!-- Inner Page Banner -->
    <div class="mss-inner-banner">
        <div class="mss-inner-banner-bg"></div>
        <div class="mss-inner-banner-orb mss-ib-orb-l"></div>
        <div class="mss-inner-banner-orb mss-ib-orb-r"></div>
        <div class="container" style="position:relative;z-index:2;">
            <div class="mss-inner-banner-row">
                <div class="mss-inner-banner-left">
                    <div class="mss-inner-badge">
                        <i class="feather-search"></i> Career Opportunities
                    </div>
                    <h1 class="mss-inner-title">Browse Career Opportunities</h1>
                    <p class="mss-inner-sub">Find your next role at The Madras Seva Sadan across all units.</p>
                </div>
                <nav class="mss-breadcrumb-pill" aria-label="breadcrumb">
                    <a href="/mss-career-portal/home" class="mss-bc-item">
                        <i class="feather-home" style="font-size:0.75rem;"></i> Home
                    </a>
                    <span class="mss-bc-sep"><i class="feather-chevron-right"></i></span>
                    <span class="mss-bc-item mss-bc-active">Search Jobs</span>
                </nav>
            </div>
        </div>
    </div>
    <style>
        .mss-inner-banner {
            position: relative;
            background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 55%, #1D4ED8 100%);
            padding: 3rem 0;
            overflow: hidden;
            margin-top: 0;
        }
        .mss-inner-banner-bg {
            position: absolute; inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
        }
        .mss-inner-banner-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
        }
        .mss-ib-orb-l {
            width: 400px; height: 400px;
            background: rgba(59,130,246,0.18);
            top: -150px; left: -100px;
        }
        .mss-ib-orb-r {
            width: 300px; height: 300px;
            background: rgba(99,102,241,0.15);
            bottom: -100px; right: 5%;
        }
        .mss-inner-banner-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .mss-inner-banner-left { flex: 1; min-width: 0; }
        .mss-inner-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 50px;
            padding: 5px 14px;
            font-family: 'Rubik', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            margin-bottom: 0.75rem;
            backdrop-filter: blur(8px);
        }
        .mss-inner-title {
            font-family: 'Rubik', sans-serif;
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            font-weight: 800;
            color: #fff;
            margin: 0 0 0.5rem;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }
        .mss-inner-sub {
            font-family: 'Rubik', sans-serif;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.65);
            margin: 0;
            line-height: 1.6;
        }
        .mss-breadcrumb-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 50px;
            padding: 8px 18px;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .mss-bc-item {
            font-family: 'Rubik', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: color 0.15s;
        }
        .mss-bc-item:hover { color: #fff; }
        .mss-bc-sep {
            color: rgba(255,255,255,0.35);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
        }
        .mss-bc-active {
            font-weight: 700;
            color: #fff !important;
        }
        @media (max-width: 767px) {
            .mss-inner-banner { padding: 2rem 0; }
            .mss-breadcrumb-pill { display: none; }
        }
    </style>

    <!-- Main Container Layout -->
    <div class="container section-padding">
        <div class="row g-5">
            <!-- Professional Sidebar Filters -->
            <div class="col-lg-4 col-xl-3">
                <div class="card-neo position-sticky top-0" style="top: 100px;">
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                        <h5 class="fw-bold mb-0 text-dark font-Outfit"><i class="bi bi-funnel text-primary me-2"></i>
                            Filters</h5>
                        <button
                            class="btn btn-link text-muted p-0 text-decoration-none small fw-medium text-uppercase font-Plus Jakarta Sans border-0 shadow-none bg-transparent"
                            onclick="window.location.reload()">Clear All</button>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted text-uppercase font-Plus Jakarta Sans">Search
                            Keywords</label>
                        <div class="position-relative">
                            <i class="bi bi-search position-absolute top-50 translate-middle-y ms-3 text-muted"></i>
                            <input type="text" id="filter-search"
                                class="form-control rounded-pill ps-5 bg-white shadow-none"
                                placeholder="e.g. Science Teacher...">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label
                            class="form-label fw-bold small text-muted text-uppercase font-Plus Jakarta Sans">Institution</label>
                        <select class="form-select rounded-pill shadow-none fw-medium text-dark" id="filter-school">
                            <option value="">All Campuses</option>
                            <option value="Lady Andal School">Lady Andal School</option>
                            <option value="Sir Mutha School">Sir Mutha School</option>
                            <option value="Lady Andal Open School">Lady Andal Open School</option>
                        </select>
                    </div>

                    <div class="mb-5">
                        <label
                            class="form-label fw-bold small text-muted text-uppercase font-Plus Jakarta Sans border-bottom pb-2 w-100">Job
                            Type</label>
                        <div class="d-flex flex-column gap-3 mt-3">
                            <div class="form-check d-flex align-items-center">
                                <input class="form-check-input mt-0 border-2" type="checkbox" id="type1"
                                    value="Full Time" onchange="applyFilters()"
                                    style="width: 20px; height: 20px; cursor: pointer;">
                                <label
                                    class="form-check-label ms-3 text-dark fw-medium font-Plus Jakarta Sans cursor-pointer"
                                    for="type1">Full Time</label>
                            </div>
                            <div class="form-check d-flex align-items-center">
                                <input class="form-check-input mt-0 border-2" type="checkbox" id="type2"
                                    value="Part Time" onchange="applyFilters()"
                                    style="width: 20px; height: 20px; cursor: pointer;">
                                <label
                                    class="form-check-label ms-3 text-dark fw-medium font-Plus Jakarta Sans cursor-pointer"
                                    for="type2">Part Time</label>
                            </div>
                            <div class="form-check d-flex align-items-center">
                                <input class="form-check-input mt-0 border-2" type="checkbox" id="type3"
                                    value="Contract" onchange="applyFilters()"
                                    style="width: 20px; height: 20px; cursor: pointer;">
                                <label
                                    class="form-check-label ms-3 text-dark fw-medium font-Plus Jakarta Sans cursor-pointer"
                                    for="type3">Contract</label>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100 rounded-pill shadow-none fw-bold" id="btn-apply-filters">Apply
                        Filters</button>
                </div>
            </div>

            <!-- Job Listings column -->
            <div class="col-lg-8 col-xl-9">
                <div
                    class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 pb-3 border-bottom gap-3">
                    <h5 class="mb-0 text-dark fw-bold font-Outfit d-flex align-items-center">
                        <span id="job-count-label" class="me-2 text-primary">0</span> <span
                            class="text-muted fs-6 fw-medium">Roles available</span>
                        <div class="spinner-grow text-primary spinner-grow-sm d-none ms-2" id="loading-mini"
                            role="status"></div>
                    </h5>

                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted small fw-bold text-uppercase">Sort by:</span>
                        <select
                            class="form-select border-0 bg-transparent text-dark fw-bold shadow-none cursor-pointer w-auto p-0 ps-2"
                            style="font-size: 0.95rem;">
                            <option>Most Relevant</option>
                            <option>Newest First</option>
                            <option>Closing Soon</option>
                        </select>
                    </div>
                </div>

                <div id="jobs-list" class="d-flex flex-column gap-4">
                    <!-- Loading State Skeleton -->
                    <div class="card-neo d-flex align-items-center py-4 px-4 bg-white" aria-hidden="true">
                        <div class="rounded-circle me-4 placeholder-glow"
                            style="width: 50px; height: 50px; background-color: var(--border-color);"><span
                                class="placeholder col-12 h-100 rounded-circle"></span></div>
                        <div class="flex-grow-1 placeholder-glow">
                            <span class="placeholder col-6 bg-secondary rounded mb-2"></span><br>
                            <span class="placeholder col-4 bg-light rounded mt-2"></span>
                        </div>
                    </div>
                </div>

                <!-- Clean Pagination -->
                <nav class="mt-5 pt-4 d-flex justify-content-center">
                    <ul class="pagination pagination-md gap-2 shadow-sm rounded-pill bg-white px-2 py-2">
                        <li class="page-item disabled"><a
                                class="page-link rounded-circle border-0 text-muted shadow-none fw-bold d-flex align-items-center justify-content-center bg-transparent"
                                style="width: 40px; height: 40px;" href="#"><i class="bi bi-chevron-left"></i></a></li>
                        <li class="page-item"><a
                                class="page-link rounded-circle border-0 text-white bg-primary shadow-none fw-bold d-flex align-items-center justify-content-center"
                                style="width: 40px; height: 40px;" href="#">1</a></li>
                        <li class="page-item"><a
                                class="page-link rounded-circle border-0 text-dark bg-transparent shadow-none fw-bold d-flex align-items-center justify-content-center hover-text-primary"
                                style="width: 40px; height: 40px;" href="#">2</a></li>
                        <li class="page-item"><a
                                class="page-link rounded-circle border-0 text-dark bg-transparent shadow-none fw-bold d-flex align-items-center justify-content-center hover-text-primary"
                                style="width: 40px; height: 40px;" href="#"><i class="bi bi-chevron-right"></i></a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/mss-career-portal/assets/js/main.js"></script>
    <script src="/mss-career-portal/apis/jobs.js"></script>
    <script>
        $(document).ready(function () {
            $("#candidate-navbar").load("/mss-career-portal/components/candidate-navbar.html");

            setTimeout(() => { loadJobs(); }, 300);
            $('#btn-apply-filters').click(applyFilters);
        });

        function applyFilters() {
            let types = [];
            $('input[type="checkbox"]:checked').each(function () { types.push($(this).val()) });
            let filterType = types.length > 0 ? types[0] : '';

            let filters = {
                search: $('#filter-search').val(),
                school: $('#filter-school').val(),
                type: filterType
            };
            $('#loading-mini').removeClass('d-none');
            loadJobs(filters);
        }

        function loadJobs(filters = {}) {
            $('#jobs-list').html('<div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>');

            api.jobs.getAllJobs(filters).then(function (jobs) {
                $('#loading-mini').addClass('d-none');
                $('#job-count-label').html(`${jobs.length}`);

                if (jobs.length === 0) {
                    $('#jobs-list').html(`
                        <div class="text-center py-5 bg-white rounded-lg border border-border-color">
                            <i class="bi bi-folder-x text-muted opacity-50 display-3"></i>
                            <h4 class="mt-4 font-Outfit fw-bold text-dark">No open roles found</h4>
                            <p class="text-muted">Try adjusting your filters or search terms.</p>
                            <button class="btn btn-outline-primary rounded-pill mt-3 shadow-none fw-bold" onclick="window.location.reload()">Reset Search</button>
                        </div>
                    `);
                    return;
                }

                let html = '';
                jobs.forEach((job, index) => {
                    html += `
                    <div class="card-neo d-flex flex-column flex-md-row align-items-md-center px-4 py-4 w-100">
                        <div class="rounded-circle d-flex align-items-center justify-content-center me-md-4 mb-3 mb-md-0" style="width: 60px; height: 60px; background-color: var(--primary-light); color: var(--primary); font-size: 1.5rem;">
                            <i class="bi bi-briefcase-fill"></i>
                        </div>
                        
                        <div class="flex-grow-1">
                            <h4 class="mb-1 font-Outfit fw-bold">
                               <a href="/mss-career-portal/job-detail?id=${job.id}" class="text-decoration-none text-dark hover-text-primary transition">${job.title}</a>
                            </h4>
                            <div class="d-flex flex-wrap gap-2 text-muted fw-medium font-Plus Jakarta Sans small mt-2">
                               <span><i class="bi bi-building me-1"></i> ${job.school}</span>
                               <span class="ms-2"><i class="bi bi-geo-alt me-1 text-danger"></i> ${job.location}</span>
                            </div>
                            
                            <div class="d-flex flex-wrap gap-2 mt-3">
                                <span class="badge-soft badge-primary shadow-none border"><span class="rounded-circle bg-primary me-1" style="width:6px;height:6px;"></span> ${job.type}</span>
                                <span class="badge-soft bg-white text-dark shadow-sm border border-light"><i class="bi bi-calendar me-1 text-muted"></i> Posted ${job.date}</span>
                            </div>
                        </div>

                        <div class="mt-4 mt-md-0 d-flex flex-column justify-content-center align-items-md-end" style="min-width: 140px;">
                            <a href="/mss-career-portal/apply?id=${job.id}" class="btn btn-outline-primary rounded-pill w-100 fw-bold shadow-none py-2 mb-2">Apply Now</a>
                            <a href="/mss-career-portal/job-detail?id=${job.id}" class="btn text-muted fw-medium shadow-none p-0 border-0 bg-transparent text-decoration-none hover-text-dark small"><i class="bi bi-book me-1"></i> View Details</a>
                        </div>
                    </div>
                    `;
                });
                $('#jobs-list').html(html);
            });
        }
    </script>
</body>

</html>
