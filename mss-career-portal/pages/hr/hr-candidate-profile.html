<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Profile - TMSS Career Portal</title>
  <link rel="icon" href="images/mss-logo.png" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="portal-layout.css">
  <style>
    /* ── Reset / base ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --c-bg: #f1f5f9;
      --c-surface: #ffffff;
      --c-surface2: #f8fafc;
      --c-border: #e2e8f0;
      --c-border2: #cbd5e1;
      --c-text: #0f172a;
      --c-text2: #475569;
      --c-text3: #94a3b8;
      --c-accent: #2563eb;
      --c-accent-bg: #eff6ff;
      --c-green: #16a34a;
      --c-green-bg: #f0fdf4;
      --c-orange: #d97706;
      --c-orange-bg: #fffbeb;
      --c-red: #dc2626;
      --c-red-bg: #fef2f2;
      --c-purple: #7c3aed;
      --c-purple-bg: #f5f3ff;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, .06), 0 1px 2px rgba(15, 23, 42, .04);
      --shadow: 0 4px 16px rgba(15, 23, 42, .08);
    }

    body {
      background: var(--c-bg);
      color: var(--c-text);
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Page wrapper ─────────────────────────────────────────── */
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* ── Breadcrumb + header ──────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--c-text3);
      margin-bottom: 6px;
    }

    .breadcrumb a {
      color: var(--c-text3);
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: var(--c-accent);
    }

    .breadcrumb-sep {
      font-size: 10px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--c-text);
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--c-text3);
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s ease;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn-default {
      background: var(--c-surface);
      border-color: var(--c-border);
      color: var(--c-text2);
    }

    .btn-default:hover {
      border-color: var(--c-border2);
      color: var(--c-text);
    }

    .btn-primary {
      background: var(--c-accent);
      border-color: var(--c-accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-danger {
      background: var(--c-red);
      border-color: var(--c-red);
      color: #fff;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .btn-warn {
      background: var(--c-orange-bg);
      border-color: #fde68a;
      color: var(--c-orange);
    }

    .btn-warn:hover {
      background: #fef3c7;
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--c-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -.01em;
    }

    .card-body {
      padding: 20px;
    }

    /* ── Profile header card ──────────────────────────────────── */
    .profile-hero {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -.02em;
    }

    .profile-info {
      flex: 1;
      min-width: 0;
    }

    .profile-name {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: 2px;
    }

    .profile-role {
      font-size: 13px;
      color: var(--c-text3);
      margin-bottom: 12px;
    }

    .profile-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 12.5px;
      color: var(--c-text2);
      margin-bottom: 12px;
    }

    .profile-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .profile-badges {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .badge-blue {
      background: var(--c-accent-bg);
      border-color: #bfdbfe;
      color: var(--c-accent);
    }

    .badge-green {
      background: var(--c-green-bg);
      border-color: #bbf7d0;
      color: var(--c-green);
    }

    .badge-orange {
      background: var(--c-orange-bg);
      border-color: #fde68a;
      color: var(--c-orange);
    }

    .badge-purple {
      background: var(--c-purple-bg);
      border-color: #ddd6fe;
      color: var(--c-purple);
    }

    .badge-gray {
      background: var(--c-surface2);
      border-color: var(--c-border);
      color: var(--c-text3);
    }

    .badge-red {
      background: var(--c-red-bg);
      border-color: #fecaca;
      color: var(--c-red);
    }

    /* ── Tabs ─────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--c-border);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--c-text3);
      border: none;
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
      font-family: inherit;
    }

    .tab:hover {
      color: var(--c-text);
    }

    .tab.active {
      color: var(--c-accent);
      border-bottom-color: var(--c-accent);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* ── Grid helpers ─────────────────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .grid-2-eq {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 700px) {

      .grid-2,
      .grid-2-eq {
        grid-template-columns: 1fr;
      }
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Info rows ────────────────────────────────────────────── */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--c-border);
      gap: 8px;
      font-size: 13px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: var(--c-text3);
      font-weight: 600;
    }

    .info-value {
      font-weight: 700;
      text-align: right;
    }

    /* ── Timeline ─────────────────────────────────────────────── */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .tl-item {
      display: flex;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--c-border);
    }

    .tl-item:last-child {
      border-bottom: none;
    }

    .tl-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }


    .tl-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .tl-sub {
      font-size: 12px;
      color: var(--c-text2);
      margin-bottom: 2px;
    }

    .tl-meta {
      font-size: 11.5px;
      color: var(--c-text3);
    }

    /* ── Progress bar ─────────────────────────────────────────── */
    .progress-wrap {
      margin-bottom: 14px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12.5px;
    }

    .progress-bar {
      height: 7px;
      border-radius: 99px;
      background: var(--c-border);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .6s cubic-bezier(.4, 0, .2, 1);
    }

    /* ── PDF viewer placeholder ───────────────────────────────── */
    .pdf-viewer {
      background: var(--c-surface2);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--c-text3);
      text-align: center;
      padding: 30px;
    }

    .pdf-viewer .icon {
      font-size: 2.5rem;
    }

    .pdf-viewer .name {
      font-weight: 700;
      font-size: 14px;
      color: var(--c-text2);
    }

    .pdf-viewer .meta {
      font-size: 12px;
    }

    /* ── Document item ────────────────────────────────────────── */
    .doc-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--c-surface2);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      margin-bottom: 8px;
    }

    .doc-item:last-child {
      margin-bottom: 0;
    }

    .doc-item:hover {
      border-color: var(--c-accent);
      box-shadow: 0 0 0 3px #2563eb15;
    }

    .doc-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .doc-info {
      flex: 1;
      min-width: 0;
    }

    .doc-name {
      font-size: 13px;
      font-weight: 700;
    }

    .doc-size {
      font-size: 11.5px;
      color: var(--c-text3);
      margin-top: 1px;
    }

    /* ── Interview round card ─────────────────────────────────── */
    .interview-card {
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 12px;
      transition: border-color .15s;
    }

    .interview-card:last-child {
      margin-bottom: 0;
    }

    .interview-card.active {
      border-color: #fed7aa;
    }

    .interview-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
      gap: 12px;
    }

    .interview-title {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .interview-meta {
      font-size: 12px;
      color: var(--c-text3);
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    @media (max-width: 520px) {
      .score-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .score-cell {
      text-align: center;
      background: var(--c-surface2);
      border-radius: var(--radius-sm);
      padding: 10px 8px;
    }

    .score-num {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--c-green);
      line-height: 1;
    }

    .score-name {
      font-size: 11px;
      color: var(--c-text3);
      margin-top: 3px;
    }

    .interview-feedback {
      font-size: 13px;
      color: var(--c-text2);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    /* ── Prescreening Q&A ─────────────────────────────────────── */
    .qa-block {
      background: var(--c-surface2);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 12px;
    }

    .qa-block:last-of-type {
      margin-bottom: 0;
    }

    .qa-q {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .qa-a {
      font-size: 13px;
      color: var(--c-text2);
      line-height: 1.65;
      margin-bottom: 8px;
    }

    .qa-eval {
      font-size: 12px;
      font-weight: 700;
      color: var(--c-green);
    }

    .summary-box {
      background: var(--c-green-bg);
      border: 1px solid #bbf7d0;
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-top: 16px;
    }

    .summary-box-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--c-green);
      margin-bottom: 4px;
    }

    .summary-box-body {
      font-size: 13px;
      color: var(--c-text2);
    }

    /* ── Textarea / form elements ─────────────────────────────── */
    textarea,
    input,
    select {
      width: 100%;
      padding: 9px 12px;
      font-size: 13px;
      font-family: inherit;
      background: var(--c-surface);
      color: var(--c-text);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      resize: vertical;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--c-accent);
      box-shadow: 0 0 0 3px #2563eb18;
    }

    /* ── Empty state ──────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      border: 2px dashed var(--c-border2);
      border-radius: var(--radius);
      background: var(--c-surface);
      color: var(--c-text3);
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .empty-state .title {
      font-size: 15px;
      font-weight: 700;
      color: var(--c-text2);
      margin-bottom: 6px;
    }

    .empty-state .body {
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* ── Modal ────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(15, 23, 42, .5);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .modal {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      box-shadow: 0 24px 60px rgba(15, 23, 42, .2);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp .25s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(16px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .modal-header {
      padding: 20px 24px 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.01em;
    }

    .modal-body {
      padding: 20px 24px;
    }

    .modal-footer {
      padding: 0 24px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text2);
    }

    .form-group.span2 {
      grid-column: 1 / -1;
    }

    @media (max-width: 480px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.span2 {
        grid-column: auto;
      }
    }

    /* ── Notes textarea footer ────────────────────────────────── */
    .notes-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <!-- Portal shell (header, sidebar, notifications) injected by portal-layout.js -->

  <div class="page-wrap">

    <!-- ── Page header ─────────────────────────────────────── -->
    <div class="page-header">
      <div>
        <div class="breadcrumb">
          <a href="/mss-career-portal/hr/jobapplicants-list">Applicants</a>
          <span class="breadcrumb-sep">›</span>
          <span id="breadcrumb-name">—</span>
        </div>
        <div class="page-title" id="profile-title">—</div>
        <div class="page-subtitle" id="profile-subtitle">Applied for: —</div>
      </div>
      <div class="header-actions" id="header-actions">
        <!-- Injected dynamically -->
      </div>
    </div>

    <!-- ── Profile hero ────────────────────────────────────── -->
    <div class="profile-hero">
      <div class="profile-avatar" id="hero-avatar">—</div>
      <div class="profile-info">
        <div class="profile-name" id="hero-name">—</div>
        <div class="profile-role" id="hero-role-exp">—</div>
        <div class="profile-meta" id="hero-meta">
          <!-- Injected dynamically -->
        </div>
        <div class="profile-badges" id="hero-badges">
          <!-- Injected dynamically -->
        </div>
      </div>
    </div>

    <!-- ── Tabs ─────────────────────────────────────────────── -->
    <div class="tabs" role="tablist">
      <button class="tab active" role="tab" onclick="switchTab('overview',   this)">Overview</button>
      <button class="tab" role="tab" onclick="switchTab('resume',     this)">Resume &amp; Docs</button>
      <button class="tab" role="tab" onclick="switchTab('skills',     this)">Skills &amp; Experience</button>
      <button class="tab" role="tab" onclick="switchTab('prescreening',this)">Pre-Screening</button>
      <button class="tab" role="tab" onclick="switchTab('interviews', this)">Interview History</button>
      <button class="tab" role="tab" onclick="switchTab('offer',      this)">Offer Details</button>
      <button class="tab" role="tab" onclick="switchTab('masset',     this)">MASSET Status</button>
    </div>

    <!-- ══════════════ TAB: OVERVIEW ════════════════════════════ -->
    <div id="tab-overview" class="tab-panel active">
      <div class="grid-2">
        <div class="stack">
          <!-- Summary -->
          <div class="card">
            <div class="card-header"><span class="card-title">Professional Summary</span></div>
            <div class="card-body" id="summary-content"
              style="font-size:13.5px; color:var(--c-text2); line-height:1.8;">
              —
            </div>
          </div>
        </div>
        <div class="stack">
          <!-- Quick stats -->
          <div class="card">
            <div class="card-header"><span class="card-title">Quick Stats</span></div>
            <div class="card-body" id="overview-quick-stats">
              <!-- Injected dynamically -->
            </div>
          </div>
          <!-- Stage history -->
          <div class="card">
            <div class="card-header"><span class="card-title">Stage History</span></div>
            <div class="card-body">
              <div class="timeline" id="overview-timeline">
                <!-- Injected dynamically -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══════════════ TAB: RESUME & DOCS ═══════════════════════ -->
    <div id="tab-resume" class="tab-panel">
      <div class="grid-2">
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="ti ti-file-text" aria-hidden="true"></i> Resume</span>
            <button class="btn btn-default btn-sm" id="downloadResumeBtn" onclick="window.open('#')">Download</button>
          </div>
          <div class="card-body">
            <div class="pdf-viewer" id="pdfViewerContainer">
              <!-- Injected dynamically -->
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">All Documents</span></div>
          <div class="card-body" id="allDocsList">
            <!-- Injected dynamically -->
          </div>
        </div>
      </div>
    </div>

    <!-- ══════════════ TAB: SKILLS & EXPERIENCE ═════════════════ -->
    <div id="tab-skills" class="tab-panel">
      <div class="grid-2-eq">
        <div class="stack">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Skills Match Analysis</span>
              <span class="badge badge-green" id="skillsMatchBadge">80% Match</span>
            </div>
            <div class="card-body">
              <div id="skills-chart"></div>
            </div>
          </div>
        </div>
        <div class="stack">
          <div class="card">
            <div class="card-header"><span class="card-title">Work History</span></div>
            <div class="card-body">
              <div class="timeline" id="experience-timeline">
                <!-- Injected dynamically -->
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Education</span></div>
            <div class="card-body">
              <div class="timeline" id="education-timeline">
                <!-- Injected dynamically -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══════════════ TAB: PRE-SCREENING ═══════════════════════ -->
    <div id="tab-prescreening" class="tab-panel">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Pre-Screening Responses</span>
          <span class="badge badge-green" id="prescreenScoreBadge">Score: —</span>
        </div>
        <div class="card-body" id="prescreening-list">
          <!-- Injected dynamically -->
        </div>
      </div>
    </div>

    <!-- ══════════════ TAB: INTERVIEW HISTORY ═══════════════════ -->
    <div id="tab-interviews" class="tab-panel">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Interview History</span>
          <button class="btn btn-primary btn-sm" id="scheduleNextRoundBtn" onclick="scheduleInterview()">+ Schedule Next
            Round</button>
        </div>
        <div class="card-body" id="interviews-list">
          <!-- Injected dynamically -->
        </div>
      </div>
    </div>

    <!-- ══════════════ TAB: OFFER DETAILS ═══════════════════════ -->
    <div id="tab-offer" class="tab-panel">
      <div class="empty-state" id="offer-tab-content">
        <!-- Injected dynamically -->
      </div>
    </div>

    <!-- ══════════════ TAB: MASSET STATUS ═══════════════════════ -->
    <div id="tab-masset" class="tab-panel">
      <div class="empty-state" id="masset-tab-content">
        <!-- Injected dynamically -->
      </div>
    </div>

  </div><!-- /page-wrap -->

  <!-- ── Scripts ─────────────────────────────────────────────── -->
  <script src="portal-layout.js"></script>
  <script>
    /* Tell portal-layout.js this is an HR session */
    if (!localStorage.getItem('userRole')) localStorage.setItem('userRole', 'hr');

    /* ── API Configuration ── */
    const JOBS_API_BASE = (typeof AUTH_API_BASE !== 'undefined') ? AUTH_API_BASE : '';
    const token = localStorage.getItem('access_token');

    // Parse applicant ID
    const urlParams = new URLSearchParams(window.location.search);
    const applicantId = urlParams.get('id') || urlParams.get('applicant_id');
    let candidateData = null;

    if (!applicantId) {
      alert('No candidate ID provided.');
      window.location.href = '/mss-career-portal/hr/jobapplicants-list';
    }

    if (!token) {
      window.location.href = '/mss-career-portal/home';
    }

    /* ── Tab switching ──────────────────────────────────────────── */
    function switchTab(id, el) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      el.classList.add('active');
      if (id === 'skills') renderSkillsChart();
    }

    /* ── Fetch Profile Details ── */
    function fetchCandidateProfile() {
      fetch(JOBS_API_BASE + '/jobs/applicants/' + applicantId, {
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(res => {
          if (!res.ok) throw new Error();
          return res.json();
        })
        .then(data => {
          candidateData = data;
          renderHeader();
          renderHero();
          renderOverviewTab();
          renderResumeTab();
          renderSkillsTab();
          renderPreScreeningTab();
          renderInterviewsTab();
          renderOfferTab();
          renderMassetTab();
        })
        .catch(err => {
          console.error('Failed to load candidate profile:', err);
          alert('Error loading candidate profile.');
        });
    }

    /* ── Rendering Functions ── */

    function getStageBadgeClass(stage) {
      const map = {
        'Applied': 'badge-blue', 'Screened': 'badge-purple', 'Interview': 'badge-orange',
        'Offer': 'badge-blue', 'Offer Accepted': 'badge-green',
        'Onboarding': 'badge-green', 'Rejected': 'badge-red'
      };
      return map[stage] || 'badge-gray';
    }

    function getInterviewStatusBadgeClass(status) {
      if (!status) return 'badge-gray';
      const sLower = status.toLowerCase();
      if (sLower === 'scheduled') return 'badge-orange';
      if (sLower === 'completed') return 'badge-green';
      if (sLower === 'pending') return 'badge-gray';
      if (sLower === 'selected') return 'badge-green';
      if (sLower === 'rejected') return 'badge-red';
      if (sLower === 'hold' || sLower === 'on hold') return 'badge-orange';
      if (sLower === 'next round' || sLower === 'next_round') return 'badge-purple';
      return 'badge-gray';
    }

    function renderHeader() {
      document.getElementById('breadcrumb-name').textContent = candidateData.name;
      document.getElementById('profile-title').textContent = candidateData.name;
      document.getElementById('profile-subtitle').textContent = 'Applied for: ' + candidateData.job;

      const actionsEl = document.getElementById('header-actions');
      actionsEl.innerHTML = '';

      // If the candidate status is Selected, Offer, Offer Accepted, Onboarding, or Rejected, hide the actions
      const hideActionsStages = ['Offer', 'Offer Accepted', 'Onboarding', 'Rejected'];
      const isSelected = candidateData.interviewStatus === 'Selected';
      const isHold = candidateData.interviewStatus === 'Hold';

      if (!hideActionsStages.includes(candidateData.stage) && !isSelected) {
        actionsEl.innerHTML += `<button class="btn btn-warn" onclick="holdCandidate()"><i class="ti ti-player-pause"></i> Put On Hold</button>`;
        actionsEl.innerHTML += `<button class="btn btn-danger" onclick="rejectCandidate()"><i class="ti ti-circle-x"></i> Reject</button>`;
      } else if (isSelected) {
        actionsEl.innerHTML += `<span class="badge badge-green" style="font-size: 14px; padding: 8px 12px;">Status: Selected</span>`;
      }
    }

    function renderHero() {
      const initials = candidateData.name.split(' ').map(p => p[0]).join('').substring(0, 2).toUpperCase();
      document.getElementById('hero-avatar').textContent = initials;
      document.getElementById('hero-name').textContent = candidateData.name;
      document.getElementById('hero-role-exp').textContent = `${candidateData.job} · ${candidateData.exp} Experience`;

      const metaEl = document.getElementById('hero-meta');
      const meta = candidateData.metadata;
      metaEl.innerHTML = `
        <span><i class="ti ti-mail"></i> ${candidateData.email}</span>
        <span><i class="ti ti-device-mobile"></i> ${candidateData.mobile}</span>
        <span><i class="ti ti-map-pin"></i> ${meta.city ? (meta.city + ', ' + meta.state) : 'Location details not set'}</span>
      `;

      const badgesEl = document.getElementById('hero-badges');
      badgesEl.innerHTML = `
        <span class="badge ${getStageBadgeClass(candidateData.stage)}"><i class="ti ti-point-filled"></i> ${candidateData.stage}</span>
        <span class="badge badge-gray">Applied ${candidateData.appliedDate} · ID: APP-${String(candidateData.id).padStart(4, '0')}</span>
      `;
    }

    function renderOverviewTab() {
      // Bio
      document.getElementById('summary-content').textContent = candidateData.metadata.about || 'No professional summary provided.';

      // Quick stats
      const statsEl = document.getElementById('overview-quick-stats');
      const noticePeriod = (candidateData.experience && candidateData.experience.length > 0 && candidateData.experience[0].notice_period) ? candidateData.experience[0].notice_period : '—';
      let statusHtml = '—';
      if (candidateData.interviewStatus) {
        statusHtml = `<span class="badge ${getInterviewStatusBadgeClass(candidateData.interviewStatus)}">${candidateData.interviewStatus}</span>`;
      }

      statsEl.innerHTML = `
        <div class="info-row"><span class="info-label">Applied Date</span><span class="info-value">${candidateData.appliedDate}</span></div>
        <div class="info-row"><span class="info-label">Current Stage</span><span class="info-value"><span class="badge ${getStageBadgeClass(candidateData.stage)}">${candidateData.stage}</span></span></div>
        <div class="info-row"><span class="info-label">Interview Status</span><span class="info-value">${statusHtml}</span></div>
        <div class="info-row"><span class="info-label">Notice Period</span><span class="info-value">${noticePeriod}</span></div>
      `;

      // Timeline / Stage History
      const timelineEl = document.getElementById('overview-timeline');
      timelineEl.innerHTML = '';

      const stages = ['Applied', 'Screened', 'Interview', 'Offer', 'Offer Accepted', 'Onboarding'];
      const currentIdx = stages.indexOf(candidateData.stage);

      stages.forEach((stage, idx) => {
        let dot = '●';
        let color = 'var(--c-text3)';
        let bg = 'var(--c-surface2)';
        let sub = '';

        if (idx < currentIdx || (candidateData.stage === 'Rejected' && idx === 0)) {
          dot = '✓';
          color = 'var(--c-green)';
          bg = 'var(--c-green-bg)';
        } else if (stage === candidateData.stage) {
          dot = '●';
          color = 'var(--c-orange)';
          bg = 'var(--c-orange-bg)';
          sub = ' (Active)';
        }

        timelineEl.innerHTML += `
          <div class="tl-item">
            <div class="tl-dot" style="background:${bg};color:${color};">${dot}</div>
            <div class="tl-body">
              <div class="tl-title" style="color:${color};font-weight:700;">${stage}${sub}</div>
              <div class="tl-meta">${idx <= currentIdx ? candidateData.appliedDate : ''}</div>
            </div>
          </div>
        `;
      });
    }

    function renderResumeTab() {
      const viewer = document.getElementById('pdfViewerContainer');
      const resume = candidateData.metadata.resume_doc;
      const downloadBtn = document.getElementById('downloadResumeBtn');

      const getFilename = (path) => {
        if (!path) return '';
        return path.split(/[\\/]/).pop();
      };

      if (resume) {
        const resumeName = getFilename(resume);
        const encodedResume = encodeURIComponent(resume);
        const downloadUrl = JOBS_API_BASE + '/apply/download/' + encodedResume;

        const doView = () => {
          window.open(downloadUrl + '?inline=true', '_blank');
        };

        const doDownload = () => {
          const a = document.createElement('a');
          a.href = downloadUrl;
          a.download = resumeName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        };

        downloadBtn.onclick = doDownload;
        downloadBtn.style.display = 'inline-flex';

        viewer.innerHTML = `
          <div class="pdf-viewer">
            <div class="icon"><i class="ti ti-file-text"></i></div>
            <div class="name">${resumeName}</div>
            <div class="meta">PDF Document</div>
            <button class="btn btn-primary btn-sm" style="margin-top:10px;" id="inlineDownloadBtn">View Resume</button>
          </div>
        `;
        document.getElementById('inlineDownloadBtn').onclick = doView;
      } else {
        downloadBtn.style.display = 'none';
        viewer.innerHTML = `<div style="text-align:center;color:var(--c-text3);padding:30px;">No resume document uploaded.</div>`;
      }

      const docsEl = document.getElementById('allDocsList');
      docsEl.innerHTML = '';
      if (resume) {
        const resumeName = getFilename(resume);
        const encodedResume = encodeURIComponent(resume);
        const downloadUrl = `${JOBS_API_BASE}/apply/download/${encodedResume}`;

        docsEl.innerHTML += `
          <div class="doc-item">
            <div class="doc-icon" style="background:#fee2e2;"><i class="ti ti-file-text"></i></div>
            <div class="doc-info">
              <div class="doc-name">Resume (${resumeName})</div>
              <div class="doc-size">PDF Document</div>
            </div>
            <button class="btn btn-default btn-sm" id="listDownloadBtn">⬇</button>
          </div>
        `;
        document.getElementById('listDownloadBtn').onclick = () => {
          const a = document.createElement('a');
          a.href = downloadUrl;
          a.download = resumeName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        };
      }
      if (candidateData.metadata.cover_letter) {
        docsEl.innerHTML += `
          <div class="doc-item">
            <div class="doc-icon" style="background:#dbeafe;"><i class="ti ti-notes"></i></div>
            <div class="doc-info">
              <div class="doc-name">Cover Letter</div>
              <div class="doc-size">${candidateData.metadata.cover_letter}</div>
            </div>
          </div>
        `;
      }
      if (docsEl.innerHTML === '') {
        docsEl.innerHTML = `<div style="color:var(--c-text3);padding:10px;">No documents attached.</div>`;
      }
    }

    function renderSkillsTab() {
      // Skills match
      document.getElementById('skillsMatchBadge').textContent = 'Verified Skills';

      // Experience timeline
      const expEl = document.getElementById('experience-timeline');
      expEl.innerHTML = '';
      if (candidateData.experience && candidateData.experience.length) {
        candidateData.experience.forEach(exp => {
          expEl.innerHTML += `
            <div class="tl-item">
              <div class="tl-dot" style="background:#dbeafe;color:#2563eb;"><i class="ti ti-briefcase"></i></div>
              <div class="tl-body">
                <div class="tl-title">${exp.title}</div>
                <div class="tl-sub">${exp.company} · ${exp.location || 'Location not specified'}</div>
                <div class="tl-meta">${exp.start_date} – ${exp.end_date} (${exp.type})</div>
                <div style="font-size:12px;color:var(--c-text2);margin-top:4px;">${exp.description || ''}</div>
              </div>
            </div>
          `;
        });
      } else {
        expEl.innerHTML = `<div style="color:var(--c-text3);padding:10px;">No work history entries provided.</div>`;
      }

      // Education timeline
      const eduEl = document.getElementById('education-timeline');
      eduEl.innerHTML = '';
      if (candidateData.education && candidateData.education.length) {
        candidateData.education.forEach(edu => {
          const score = edu.percentage ? `${edu.percentage}%` : (edu.cgpa ? `CGPA: ${edu.cgpa}` : '');
          eduEl.innerHTML += `
            <div class="tl-item">
              <div class="tl-dot" style="background:#d1fae5;color:#16a34a;"><i class="ti ti-school"></i></div>
              <div class="tl-body">
                <div class="tl-title">${edu.degree} – ${edu.specialization}</div>
                <div class="tl-sub">${edu.institution} (${edu.university})</div>
                <div class="tl-meta">Graduated: ${edu.end_year} · ${score}</div>
              </div>
            </div>
          `;
        });
      } else {
        eduEl.innerHTML = `<div style="color:var(--c-text3);padding:10px;">No education history entries provided.</div>`;
      }
    }

    let skillsRendered = false;
    function renderSkillsChart() {
      if (skillsRendered) return;
      skillsRendered = true;
      const el = document.getElementById('skills-chart');

      const skillsList = candidateData.metadata.skills;
      if (!skillsList || !skillsList.length) {
        el.innerHTML = `<div style="color:var(--c-text3);padding:10px;">No skills listed on profile.</div>`;
        return;
      }

      el.innerHTML = skillsList.map(skill => `
        <div class="progress-wrap">
          <div class="progress-label">
            <span>${skill}</span>
            <span style="font-weight:800;color:var(--c-green)">Verified</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:0%;background:var(--c-green)" data-target="90"></div>
          </div>
        </div>`).join('');

      requestAnimationFrame(() => {
        el.querySelectorAll('.progress-fill').forEach(bar => {
          bar.style.width = bar.dataset.target + '%';
        });
      });
    }

    function renderPreScreeningTab() {
      const listEl = document.getElementById('prescreening-list');
      listEl.innerHTML = '';

      if (candidateData.screening && candidateData.screening.length) {
        document.getElementById('prescreenScoreBadge').textContent = `Responses: ${candidateData.screening.length}`;
        candidateData.screening.forEach(item => {
          listEl.innerHTML += `
            <div class="qa-block">
              <div class="qa-q">${item.question}</div>
              <div class="qa-a"><strong>Response:</strong> ${item.answer}</div>
              ${item.expected_answer ? `<div class="qa-eval"><i class="ti ti-circle-check"></i> Expected Answer: ${item.expected_answer}</div>` : ''}
            </div>
          `;
        });
      } else {
        document.getElementById('prescreenScoreBadge').textContent = 'No responses';
        listEl.innerHTML = `<div style="text-align:center;color:var(--c-text3);padding:40px;">No pre-screening questions were answered or required for this role.</div>`;
      }
    }

    function renderInterviewsTab() {
      const listEl = document.getElementById('interviews-list');
      listEl.innerHTML = '';

      const nextBtn = document.getElementById('scheduleNextRoundBtn');
      const hasNextRoundStatus = candidateData.interviewStatus && (candidateData.interviewStatus.toLowerCase() === 'next round' || candidateData.interviewStatus.toLowerCase() === 'next_round');
      if (candidateData.stage === 'Screened' || hasNextRoundStatus) {
        nextBtn.style.display = 'inline-flex';
      } else {
        nextBtn.style.display = 'none';
      }

      if (candidateData.interviews && candidateData.interviews.length) {
        candidateData.interviews.forEach(item => {
          const dateStr = item.scheduled_at ? new Date(item.scheduled_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : '';
          const timeStr = item.scheduled_at ? new Date(item.scheduled_at).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' }) : '';

          let actionBtn = '';
          if (item.status === 'scheduled' || item.status === 'rescheduled') {
            actionBtn = `
              <div style="display:flex;gap:8px;margin-top:10px;">
                <button class="btn btn-default btn-sm" onclick="rescheduleInterviewModal(${item.job_interview_id})">Reschedule</button>
                <button class="btn btn-primary btn-sm" onclick="feedbackModal(${item.job_interview_id}, '${item.round}')">Submit Feedback</button>
              </div>
            `;
          }

          let scoreBadge = '';
          let feedbackText = '';
          if (item.remarks) {
            if (item.remarks.score) {
              scoreBadge = `<div class="score-cell"><div class="score-num">${item.remarks.score}</div><div class="score-name">Interviewer Score</div></div>`;
            }
            if (item.remarks.remarks) {
              feedbackText = `<div class="interview-feedback"><strong>Feedback:</strong> ${item.remarks.remarks}</div>`;
            }
          }

          listEl.innerHTML += `
            <div class="interview-card ${item.status === 'scheduled' ? 'active' : ''}" style="margin-bottom:15px; border: 1px solid var(--c-border); padding: 15px; border-radius: var(--radius-sm);">
              <div class="interview-top" style="display:flex;justify-content:space-between;align-items:flex-start;">
                <div>
                  <div class="interview-title" style="font-weight:700;font-size:14px;">${item.round}</div>
                  <div class="interview-meta" style="font-size:12px;color:var(--c-text3);margin-top:3px;">
                    ${dateStr} · ${timeStr} · Mode: ${item.mode.toUpperCase()} · Interviewer: ${item.interviewer || 'Not set'}
                  </div>
                  ${item.meeting_link ? `<div style="font-size:12px;margin-top:3px;">Link: <a href="${item.meeting_link}" target="_blank">${item.meeting_link}</a></div>` : ''}
                  ${item.location ? `<div style="font-size:12px;margin-top:3px;">Location: ${item.location}</div>` : ''}
                </div>
                <span class="badge ${item.status === 'completed' ? 'badge-green' : 'badge-orange'}">${item.status.toUpperCase()}</span>
              </div>
              ${scoreBadge ? `<div class="score-grid" style="margin-top:10px;">${scoreBadge}</div>` : ''}
              ${feedbackText}
              ${actionBtn}
            </div>
          `;
        });
      } else {
        listEl.innerHTML = `<div style="text-align:center;color:var(--c-text3);padding:40px;">No interviews have been scheduled yet.</div>`;
      }
    }

    function renderOfferTab() {
      const el = document.getElementById('offer-tab-content');
      if (candidateData.offer_letter_doc) {
        el.className = 'card';
        el.style.cssText = 'padding: 20px;';
        const docName = candidateData.offer_letter_doc.split(/[\\/]/).pop();
        const encodedDoc = encodeURIComponent(candidateData.offer_letter_doc);
        const downloadUrl = JOBS_API_BASE + '/apply/download/' + encodedDoc;
        
        el.innerHTML = `
          <div class="card-header"><span class="card-title">Offer Letter Details</span></div>
          <div class="card-body">
            <p style="font-size:13.5px;margin-bottom:12px;">An offer letter has been generated for this candidate.</p>
            <div class="pdf-viewer">
              <div class="icon"><i class="ti ti-file-text"></i></div>
              <div class="name">${docName}</div>
              <div class="meta">Status: ${candidateData.offer_acceptance_status.toUpperCase()}</div>
              <button class="btn btn-primary btn-sm" style="margin-top:10px;" id="downloadOfferBtn">Download Offer Letter</button>
            </div>
          </div>
        `;
        document.getElementById('downloadOfferBtn').onclick = () => {
          const a = document.createElement('a');
          a.href = downloadUrl;
          a.download = docName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        };
      } else {
        el.className = 'empty-state';
        el.innerHTML = `
          <div class="icon"><i class="ti ti-file-text" aria-hidden="true"></i></div>
          <div class="title">No Offer Generated Yet</div>
          <div class="body">Candidate is currently in the ${candidateData.stage} stage. An offer can be generated from the offer dashboard after final selection.</div>
        `;
      }
    }

    function renderMassetTab() {
      const el = document.getElementById('masset-tab-content');
      if (candidateData.sync_masset === 1) {
        el.className = 'card';
        el.style.cssText = 'padding: 20px;';
        el.innerHTML = `
          <div class="card-header"><span class="card-title">MASSET Sync Complete</span></div>
          <div class="card-body">
            <span class="badge badge-green" style="font-size:13px;padding:6px 12px;"><i class="ti ti-circle-check"></i> Synced with MASSET Database</span>
            <p style="font-size:13px;color:var(--c-text2);margin-top:10px;">The candidate record has been successfully synced to the central institutional MASSET platform.</p>
          </div>
        `;
      } else {
        el.className = 'empty-state';
        el.innerHTML = `
          <div class="icon"><i class="ti ti-refresh" aria-hidden="true"></i></div>
          <div class="title">MASSET Sync Not Initiated</div>
          <div class="body">MASSET database synchronization becomes available after candidate accepts the job offer.</div>
          <button class="btn btn-primary" onclick="location.href='/mss-career-portal/hr/masset-candidates'">Open MASSET Dashboard</button>
        `;
      }
    }

    /* ── Modal Utility ── */
    function openModal(htmlContent) {
      // Remove any existing modal overlay first
      const existing = document.querySelector('.modal-overlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal">${htmlContent}</div>`;

      // Close on backdrop click
      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) overlay.remove();
      });

      document.body.appendChild(overlay);

      // Trap focus inside modal (accessibility)
      const firstFocusable = overlay.querySelector('input, select, textarea, button');
      if (firstFocusable) firstFocusable.focus();
    }

    /* ── Schedule Modal ── */
    function scheduleInterview() {
      openModal(`
    <div class="modal-header"><i class="ti ti-calendar" aria-hidden="true"></i> Schedule Interview – ${candidateData.name}</div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group span2">
          <label>Round Name *</label>
          <input type="text" id="schRound" placeholder="e.g. Round 2 – Technical Interview" value="Round 2 - Technical Interview">
        </div>
        <div class="form-group">
          <label>Mode</label>
          <select id="schMode" onchange="toggleMeetingMode()">
            <option value="online">Online</option>
            <option value="offline">In-Person</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="schDate" value="${new Date().toISOString().split('T')[0]}">
        </div>
        <div class="form-group">
          <label>Start Time *</label>
          <input type="time" id="startTime" value="10:00">
        </div>
        <div class="form-group">
          <label>End Time *</label>
          <input type="time" id="endTime" value="">
        </div>
        <div class="form-group span2">
          <label>Interviewer *</label>
          <select id="schInterviewer">
            <option value="">Loading interviewers…</option>
          </select>
        </div>
        <div class="form-group span2">
          <label id="dynamicLabel">Meeting Link</label>
          <input type="text" id="schModeInput" placeholder="https://meet.google.com/...">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="submitSchedule()"><i class="ti ti-calendar" aria-hidden="true"></i> Schedule Interview</button>
    </div>`);
      loadSchoolAdmins('schInterviewer');
    }

    function toggleMeetingMode() {
      const mode = document.getElementById('schMode').value;
      const label = document.getElementById('dynamicLabel');
      const input = document.getElementById('schModeInput');
      if (mode === 'online') {
        label.textContent = 'Meeting Link';
        input.value = '';
        input.placeholder = 'https://meet.google.com/...';
      } else {
        label.textContent = 'Interview Location';
        input.value = '';
        input.placeholder = 'Enter office / hall room location';
      }
    }

    /* ── Interviewer dropdown loader ── */
    function loadInterviewers(selectId) {
      fetch(JOBS_API_BASE + '/auth/interviewers', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(res => res.ok ? res.json() : Promise.reject(res))
        .then(list => {
          const sel = document.getElementById(selectId);
          if (!sel) return;
          if (!list.length) {
            sel.innerHTML = '<option value="">No interviewers found (role_id=3)</option>';
            return;
          }
          const selectedVal = sel.getAttribute('data-selected');
          sel.innerHTML = list.map(i =>
            `<option value="${i.name}" ${selectedVal === i.name ? 'selected' : ''}>${i.name} (${i.email})</option>`
          ).join('');
        })
        .catch(() => {
          const sel = document.getElementById(selectId);
          if (sel) sel.innerHTML = '<option value="">Failed to load — type manually</option>';
          // Swap to text input as fallback
          const wrapper = sel ? sel.parentElement : null;
          if (wrapper) {
            const input = document.createElement('input');
            input.type = 'text';
            input.id = selectId;
            input.placeholder = 'Enter interviewer name';
            wrapper.replaceChild(input, sel);
          }
        });
    }

    function loadSchoolAdmins(selectId) {
      fetch(JOBS_API_BASE + '/job-interviews/school-admins', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
        .then(res => res.ok ? res.json() : Promise.reject(res))
        .then(list => {
          const sel = document.getElementById(selectId);
          if (!sel) return;
          if (!list.length) {
            sel.innerHTML = '<option value="">No school admins found (role_id=7)</option>';
            return;
          }
          const selectedVal = sel.getAttribute('data-selected');
          sel.innerHTML = '<option value="">Select an interviewer...</option>' + list.map(i => {
            const unitDisplay = i.unit_name ? ` (Unit: ${i.unit_name})` : (i.unit_id ? ` (Unit ID: ${i.unit_id})` : '');
            // For older records, interviewer_name might be string, but here we set value to email
            return `<option value="${i.email}" ${selectedVal === i.email || selectedVal === i.name ? 'selected' : ''}>${i.email}${unitDisplay}</option>`;
          }).join('');
        })
        .catch(() => {
          const sel = document.getElementById(selectId);
          if (sel) sel.innerHTML = '<option value="">Failed to load admins</option>';
        });
    }

    function submitSchedule() {
      const round = document.getElementById('schRound').value.trim();
      const mode = document.getElementById('schMode').value;
      const dateVal = document.getElementById('schDate').value;
      const timeVal = document.getElementById('startTime').value;
      const endtimeVal = document.getElementById('endTime').value;
      const interviewer = document.getElementById('schInterviewer').value.trim();
      const modeInput = document.getElementById('schModeInput').value.trim();

      if (!round || !dateVal || !timeVal || !endtimeVal || !interviewer) {
        alert('Please fill out all required fields.');
        return;
      }

      const scheduledAtIso = `${dateVal}T${timeVal}:00`;
      const endTimeIso = `${dateVal}T${endtimeVal}:00`;
      const payload = {
        job_id: candidateData.job_id,
        job_applicant_id: candidateData.id,
        interview_round: round,
        scheduled_at: scheduledAtIso,
        end_time_at: endTimeIso,
        interview_mode: mode,
        meeting_link: mode === 'online' ? modeInput : null,
        location: mode === 'offline' ? modeInput : null,
        interviewer_name: interviewer
      };

      fetch(JOBS_API_BASE + '/job-interviews/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(payload)
      })
        .then(res => {
          if (!res.ok) throw new Error();
          return res.json();
        })
        .then(() => {
          if (window.showToast) window.showToast('Interview scheduled!', 'success');
          document.querySelector('.modal-overlay').remove();
          fetchCandidateProfile();
        })
        .catch(err => {
          console.error(err);
          alert('Failed to schedule interview.');
        });
    }

    /* ── Reschedule Modal ── */
    function rescheduleInterviewModal(interviewId) {
      const interview = candidateData.interviews.find(iv => iv.job_interview_id === interviewId);
      let initDate = new Date().toISOString().split('T')[0];
      let initStart = "";
      let initEnd = "";
      let initInterviewer = "";
      
      if (interview) {
        if (interview.scheduled_at) {
          const schAt = interview.scheduled_at;
          initDate = schAt.split('T')[0];
          initStart = schAt.split('T')[1].substring(0, 5);
        }
        if (interview.end_time_at) {
          initEnd = interview.end_time_at.split('T')[1].substring(0, 5);
        }
        if (interview.interviewer) {
          initInterviewer = interview.interviewer;
        }
      }

      openModal(`
    <div class="modal-header">📅 Reschedule Interview</div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>New Date *</label>
          <input type="date" id="reschDate" value="${initDate}">
        </div>
        <div class="form-group">
          <label>New Start Time *</label>
          <input type="time" id="reschstartTime" value="${initStart}">
        </div>
        <div class="form-group">
          <label>New End Time *</label>
          <input type="time" id="reschendTime" value="${initEnd}">
        </div>
        <div class="form-group">
        <label>Interviewer (School Admin) *</label>
        <select id="reschInterviewer" data-selected="${initInterviewer}">
          <option value="">Loading interviewers…</option>
        </select>
      </div>
      <div class="form-group">
        <label>Reason for Rescheduling</label>
        <textarea id="reschReason" placeholder="E.g., Interviewer unavailable..."></textarea>
      </div>
    </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="submitReschedule(${interviewId})">Confirm Reschedule</button>
    </div>`);
      loadSchoolAdmins('reschInterviewer');
    }

    function submitReschedule(interviewId) {
      const dateVal = document.getElementById('reschDate').value;
      const timeVal = document.getElementById('reschstartTime').value;
      const endtimeVal = document.getElementById('reschendTime').value;
      const interviewer = document.getElementById('reschInterviewer').value;
      const reason = document.getElementById('reschReason').value.trim();

      if (!dateVal || !timeVal || !endtimeVal) {
        alert('Please fill out all required fields.');
        return;
      }

      const scheduledAtIso = `${dateVal}T${timeVal}:00`;
      const endTimeIso = `${dateVal}T${endtimeVal}:00`;
      fetch(JOBS_API_BASE + `/job-interviews/${interviewId}/reschedule`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          scheduled_at: scheduledAtIso,
          end_time_at: endTimeIso,
          reschedule_reason: reason,
          interviewer_name: interviewer
        })
      })
        .then(res => {
          if (!res.ok) throw new Error();
          return res.json();
        })
        .then(() => {
          if (window.showToast) window.showToast('Interview rescheduled!', 'success');
          document.querySelector('.modal-overlay').remove();
          fetchCandidateProfile();
        })
        .catch(err => {
          console.error(err);
          alert('Failed to reschedule interview.');
        });
    }

    /* ── Remarks Modal ── */
    function feedbackModal(interviewId, roundName) {
      openModal(`
    <div class="modal-header">📝 Submit Interview Feedback – ${roundName}</div>
    <div class="modal-body">
      <div class="form-group" style="margin-bottom:12px;">
        <label>Outcome / Recommendation *</label>
        <select id="remStatus">
          <option value="next_round">Proceed to Next Round</option>
          <option value="selected">Select Candidate (Hire)</option>
          <option value="hold">Put Candidate On Hold</option>
          <option value="rejected">Reject Candidate</option>
        </select>
      </div>
      <div class="form-group">
        <label>Feedback Remarks *</label>
        <textarea id="remRemarks" rows="4" placeholder="Enter detailed feedback remarks..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="submitFeedback(${interviewId})">Submit Remarks</button>
    </div>`);
    }

    function submitFeedback(interviewId) {
      const status = document.getElementById('remStatus').value;
      const remarks = document.getElementById('remRemarks').value.trim();

      if (!status || !remarks) {
        alert('Please fill out all required fields.');
        return;
      }

      fetch(JOBS_API_BASE + `/job-interviews/${interviewId}/remarks`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          applicant_status: status,
          remarks: remarks
        })
      })
        .then(res => {
          if (!res.ok) throw new Error();
          return res.json();
        })
        .then(() => {
          if (window.showToast) window.showToast('Interview remarks saved!', 'success');
          document.querySelector('.modal-overlay').remove();
          fetchCandidateProfile();
        })
        .catch(err => {
          console.error(err);
          alert('Failed to submit feedback.');
        });
    }

    /* ── Hold Candidate ── */
    function holdCandidate() {
      openModal(`
    <div class="modal-header">⏸ Put Candidate On Hold</div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--c-text2);margin-bottom:16px;">${candidateData.name} will be placed on hold.</p>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Reason for Hold *</label>
        <select id="holdReason">
          <option>Waiting for budget approval</option>
          <option>Position temporarily on hold</option>
          <option>Other candidates being evaluated</option>
        </select>
      </div>
      <div class="form-group">
        <label>Remarks *</label>
        <textarea id="holdRemarks" rows="3" placeholder="Add hold notes..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-warn" onclick="submitHold()">Put On Hold</button>
    </div>`);
    }

    function submitHold() {
      const reason = document.getElementById('holdReason').value;
      const remarks = document.getElementById('holdRemarks').value.trim();

      fetch(JOBS_API_BASE + `/jobs/applicants/${candidateData.id}/status`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          status: 'hold',
          remarks: `${reason}. Notes: ${remarks}`
        })
      })
        .then(res => {
          if (!res.ok) throw new Error();
          return res.json();
        })
        .then(() => {
          if (window.showToast) window.showToast('Candidate put on hold.', 'success');
          document.querySelector('.modal-overlay').remove();
          fetchCandidateProfile();
        })
        .catch(err => {
          console.error(err);
          alert('Failed to put candidate on hold.');
        });
    }

    /* ── Reject Candidate ── */
    function rejectCandidate() {
      openModal(`
    <div class="modal-header"><i class="ti ti-circle-x" aria-hidden="true"></i> Reject Candidate</div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--c-text2);margin-bottom:16px;">${candidateData.name} will be marked as rejected.</p>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Rejection Reason *</label>
        <select id="rejReason">
          <option>Does not meet requirements</option>
          <option>Better candidate selected</option>
          <option>Position filled</option>
          <option>Candidate withdrew</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Detailed Feedback</label>
        <textarea id="rejNotes" rows="3" placeholder="Feedback notes..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-danger" onclick="submitRejection()">Confirm Rejection</button>
    </div>`);
    }

    function submitRejection() {
      const reason = document.getElementById('rejReason').value;
      const notes = document.getElementById('rejNotes').value.trim();

      fetch(JOBS_API_BASE + `/jobs/applicants/${candidateData.id}/status`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          status: 'rejected',
          remarks: `${reason}. Notes: ${notes}`
        })
      })
        .then(res => {
          if (!res.ok) throw new Error();
          return res.json();
        })
        .then(() => {
          if (window.showToast) window.showToast('Candidate rejected.', 'error');
          document.querySelector('.modal-overlay').remove();
          fetchCandidateProfile();
        })
        .catch(err => {
          console.error(err);
          alert('Failed to reject candidate.');
        });
    }

    /* ── Mock Application Notes Saver ── */
    function saveInternalNotes() {
      const text = document.getElementById('appNotesText').value.trim();
      if (window.showToast) {
        window.showToast('Notes saved successfully!', 'success');
      } else {
        alert('Notes saved successfully!');
      }
    }

    /* ── Fetch Profile on load ── */
    fetchCandidateProfile();
  </script>
</body>
