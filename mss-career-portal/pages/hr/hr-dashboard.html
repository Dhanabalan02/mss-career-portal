<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – TMSS Career</title>
  <link rel="icon" href="images/mss-logo.svg" type="image/svg+xml">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&display=swap"
    rel="stylesheet">
    <link rel="stylesheet" href="portal-layout.css">
  <style>
    /* ─── RESET & BASE ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 14px;
    }

    /* ─── DESIGN TOKENS ────────────────────────────────────────── */
    :root {
      /* Palette */
      --blue: #185FA5;
      --blue-mid: #378ADD;
      --blue-light: #E6F1FB;
      --blue-dark: #0C447C;
      --green: #3B6D11;
      --green-light: #EAF3DE;
      --green-mid: #639922;
      --teal: #0F6E56;
      --teal-light: #E1F5EE;
      --teal-mid: #1D9E75;
      --amber: #854F0B;
      --amber-light: #FAEEDA;
      --amber-mid: #EF9F27;
      --red: #A32D2D;
      --red-light: #FCEBEB;
      --red-mid: #E24B4A;
      --purple: #534AB7;
      --purple-light: #EEEDFE;
      --purple-mid: #7F77DD;
      --coral: #993C1D;
      --coral-light: #FAECE7;
      --cyan: #0891b2;
      --cyan-light: #CFFAFE;

      /* Neutrals – light mode */
      --bg1: #FFFFFF;
      --bg2: #F8F8F7;
      --bg3: #F1EFE8;
      --text1: #1A1A18;
      --text2: #5F5E5A;
      --text3: #888780;
      --border: rgba(0, 0, 0, 0.08);
      --border2: rgba(0, 0, 0, 0.14);
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 3px 12px rgba(0, 0, 0, 0.09);

      /* Layout */
      --sidebar-w: 220px;
      --topbar-h: 56px;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;

      /* Typography */
      --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    /* Dark theme */
    [data-theme="dark"],
    body.dark-theme {
      --bg1: #0d0d0d;
      --bg2: #111111;
      --bg3: #181818;
      --text1: #f0efe8;
      --text2: #b4b2a9;
      --text3: #666560;
      --border: rgba(255, 255, 255, 0.10);
      --border2: rgba(255, 255, 255, 0.16);
      --green-light: #173404;
      --amber-light: #412402;
      --red-light: #501313;
      --purple-light: #26215C;
      --teal-light: #04342C;
    }

    /* ─── PORTAL SIDEBAR (portal-layout.js injects this) ──────── */
    .portal-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      font-family: var(--font-body);
    }

    .portal-sidebar.is-open {
      transform: translateX(0);
      box-shadow: var(--shadow-md);
    }

    @media (min-width: 960px) {
      .portal-sidebar {
        transform: translateX(0);
        box-shadow: none;
      }
    }

    .portal-sidebar__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .portal-sidebar__title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -0.3px;
    }

    .portal-sidebar__close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-xs);
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    @media (min-width: 960px) {
      .portal-sidebar__close {
        display: none;
      }
    }

    /* Sidebar brand subtitle */
    .portal-sidebar__header::after {
      display: none;
      /* handled by title */
    }

    .portal-sidebar nav {
      display: flex;
      flex-direction: column;
      padding: 10px 8px;
      gap: 2px;
      flex: 1;
    }

    .portal-sidebar nav a {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      text-decoration: none;
      transition: background 0.14s, color 0.14s;
      white-space: nowrap;
    }

    .portal-sidebar nav a:hover {
      background: var(--bg2);
      color: var(--text1);
    }

    .portal-sidebar nav a.is-active {
      background: var(--blue-light);
      color: var(--blue);
      font-weight: 600;
    }

    /* Nav section labels – injected via CSS counters trick using :first-child nth patterns */
    /* We style every nth link group visually with a top margin */
    .portal-sidebar nav a:nth-child(4) {
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 11px;
    }

    .portal-sidebar nav a:last-child {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 11px;
    }

    /* ─── PORTAL TOPBAR (injected by portal-layout.js) ─────────── */
    .portal-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--topbar-h);
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      font-family: var(--font-body);
      gap: 12px;
    }

    .portal-topbar__left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .portal-brand {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .portal-topbar__actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    /* Icon buttons in topbar */
    .portal-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 16px;
      cursor: pointer;
      transition: background 0.14s, color 0.14s;
      position: relative;
      line-height: 1;
    }

    .portal-icon-btn:hover {
      background: var(--bg3);
      color: var(--text1);
    }

    .portal-hamburger {
      flex-direction: column;
      gap: 4px;
    }

    .portal-hamburger span {
      display: block;
      width: 16px;
      height: 1.5px;
      background: currentColor;
      border-radius: 2px;
    }

    @media (min-width: 960px) {
      .portal-hamburger {
        display: none;
      }
    }

    .portal-sun-icon {
      display: none;
    }

    body.dark-theme .portal-sun-icon {
      display: inline;
    }

    body.dark-theme .portal-moon-icon {
      display: none;
    }

    .portal-bell {
      position: relative;
    }

    .portal-badge {
      position: absolute;
      top: 3px;
      right: 3px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 999px;
      background: var(--red-mid);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--bg1);
      font-family: var(--font-body);
      line-height: 1;
    }

    .portal-badge[data-count="0"] {
      display: none;
    }

    .portal-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      flex-shrink: 0;
    }

    .portal-logout {
      font-size: 18px;
    }


    /* ─── SIDEBAR BACKDROP ──────────────────────────────────────── */
    .portal-sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 190;
    }

    .portal-sidebar-backdrop.is-open {
      display: block;
    }

    @media (min-width: 960px) {
      .portal-sidebar-backdrop {
        display: none !important;
      }
    }

    /* ─── TOAST ─────────────────────────────────────────────────── */
    .portal-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--text1);
      color: var(--bg1);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-family: var(--font-body);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 500;
      white-space: nowrap;
    }

    .portal-toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── PAGE SHELL ─────────────────────────────────────────────── */
    body {
      font-family: var(--font-body);
      background: var(--bg3);
      color: var(--text1);
      min-height: 100vh;
    }

    .page-shell {
      padding-top: var(--topbar-h);
      transition: padding-left 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }


    /* ─── PAGE HEADER ───────────────────────────────────────────── */
    .page-header {
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      padding: 15px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text1);
    }

    .page-subtitle {
      font-size: 12.5px;
      color: var(--text3);
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ─── BUTTONS ───────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text1);
      transition: all 0.14s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--bg3);
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: var(--blue-dark);
      border-color: var(--blue-dark);
    }

    .btn-sm {
      padding: 5px 11px;
      font-size: 12px;
    }

    /* ─── PAGE CONTENT ──────────────────────────────────────────── */
    .page-content {
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* ─── STAT GRID ─────────────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(168px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .stat-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-top: 3px solid var(--card-accent, var(--border2));
      border-radius: 12px;
      padding: 18px 20px;
      cursor: pointer;
      transition: transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s cubic-bezier(.4,0,.2,1);
      position: relative;
      overflow: hidden;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -.5px;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 12.5px;
      color: var(--text3);
      font-weight: 400;
    }

    .stat-delta {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
    }

    /* ─── SECTION GRIDS ─────────────────────────────────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-wide {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
      gap: 16px;
    }

    @media (max-width: 900px) {

      .grid-2,
      .grid-wide {
        grid-template-columns: 1fr;
      }
    }

    /* ─── CARD ──────────────────────────────────────────────────── */
    .card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text1);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .card-meta {
      font-size: 11.5px;
      color: var(--text3);
    }

    .card-body {
      padding: 14px 18px;
      flex: 1;
    }

    /* ─── BADGE ─────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .badge-blue {
      background: var(--blue-light);
      color: var(--blue);
    }

    .badge-green {
      background: var(--green-light);
      color: var(--green);
    }

    .badge-amber {
      background: var(--amber-light);
      color: var(--amber);
    }

    .badge-red {
      background: var(--red-light);
      color: var(--red);
    }

    .badge-purple {
      background: var(--purple-light);
      color: var(--purple);
    }

    .badge-teal {
      background: var(--teal-light);
      color: var(--teal);
    }

    /* ─── FUNNEL CHART ──────────────────────────────────────────── */
    .funnel-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .funnel-row:last-child {
      margin-bottom: 0;
    }

    .funnel-label {
      width: 100px;
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
      flex-shrink: 0;
    }

    .funnel-bar-bg {
      flex: 1;
      background: var(--bg2);
      border-radius: 5px;
      height: 26px;
      overflow: hidden;
    }

    .funnel-bar-fill {
      height: 100%;
      display: flex;
      align-items: center;
      padding-left: 9px;
      font-size: 11.5px;
      font-weight: 700;
      color: #fff;
      border-radius: 5px;
      width: 0%;
      transition: width 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .funnel-pct {
      width: 34px;
      text-align: right;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text3);
    }

    /* ─── CALENDAR ──────────────────────────────────────────────── */
    .cal-nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 0;
    }

    .cal-month-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text1);
    }

    .cal-month-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 1px;
    }

    .cal-nav-btns {
      display: flex;
      gap: 5px;
    }

    .cal-nav-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xs);
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: background 0.12s;
    }

    .cal-nav-btn:hover {
      background: var(--bg3);
    }

    .cal-view-tabs {
      display: flex;
      gap: 4px;
      padding: 10px 14px 0;
    }

    .cal-view-tab {
      font-size: 11.5px;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 999px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.12s;
    }

    .cal-view-tab.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      padding: 10px 12px 14px;
    }

    .cal-dayname {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      padding: 5px 0;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      position: relative;
      transition: background 0.12s;
      color: var(--text1);
    }

    .cal-day:hover {
      background: var(--bg2);
    }

    .cal-day.other-month {
      color: var(--text3);
    }

    /* ─── TABLE ─────────────────────────────────────────────────── */
    .table-wrap {
      overflow: auto;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
    }

    .table-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      font-family: var(--font-body);
    }

    thead th {
      text-align: left;
      padding: 9px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      cursor: pointer;
    }

    tbody tr:hover {
      background: var(--bg2);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    td {
      padding: 10px 14px;
      color: var(--text1);
      vertical-align: middle;
    }

    .td-name {
      font-weight: 600;
      font-size: 13px;
    }

    .td-sub {
      font-size: 11.5px;
      color: var(--text3);
      margin-top: 1px;
    }

    .td-muted {
      color: var(--text2);
      font-size: 12.5px;
    }

    .td-flex {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .avatar-sm {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .action-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--blue);
      text-decoration: none;
      cursor: pointer;
    }

    .action-link:hover {
      text-decoration: underline;
    }

    /* ─── PENDING ACTIONS ───────────────────────────────────────── */
    .pending-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      border-radius: 0;
    }

    .pending-item:hover {
      background: var(--bg2);
      margin: 0 -18px;
      padding: 11px 18px;
      border-radius: var(--radius-sm);
    }

    .pending-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .pending-icon {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .pending-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text1);
    }

    .pending-desc {
      font-size: 11.5px;
      color: var(--text3);
      margin-top: 2px;
    }

    .pending-count {
      margin-left: auto;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    /* ─── MODAL (for calendar day events) ──────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }

    .modal-overlay.is-open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg1);
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      padding: 22px 24px;
      min-width: 320px;
      max-width: 420px;
      width: 90%;
      box-shadow: var(--shadow-md);
      transform: translateY(8px) scale(0.98);
      transition: transform 0.18s;
    }

    .modal-overlay.is-open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text1);
    }

    .modal-event {
      background: var(--bg2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .modal-event-name {
      font-weight: 600;
      font-size: 13px;
    }

    .modal-event-meta {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    .modal-event-link {
      font-size: 12px;
      color: var(--blue);
      margin-top: 4px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
  </style>
</head>

<body>

  <!-- portal-layout.js injects header, sidebar, backdrop, notifications here -->

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div id="modalContent"></div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <!-- ── PAGE SHELL ── -->
  <div class="page-shell">

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle">Welcome back, Sarah &middot; Thursday, 15 May 2025</div>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="location.href='/mss-career-portal/hr/reports'"><i class="ti ti-chart-bar" aria-hidden="true"></i>
          Reports</button>
        <button class="btn btn-primary" onclick="location.href='/mss-career-portal/hr/jobpost-create'">+ Post New Job</button>
      </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page-content">

      <!-- STAT CARDS -->
      <div class="stat-grid" id="statGrid"></div>

      <!-- ROW 1: Funnel + Calendar -->
      <div class="grid-2">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Applicants by Stage</span>
            <span class="card-meta">Last 30 days</span>
          </div>
          <div class="card-body" id="funnelChart"></div>
        </div>

        <div class="card">
          <div class="cal-nav-bar">
            <div>
              <div class="cal-month-title" id="calTitle">May 2025</div>
              <div class="cal-month-sub">Interview Schedule</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
              <div class="cal-nav-btns">
                <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
                <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
              </div>
            </div>
          </div>
          <div class="cal-view-tabs">
            <button class="cal-view-tab active" onclick="setCalView('month',this)">Month</button>
            <button class="cal-view-tab" onclick="setCalView('week',this)">Week</button>
            <button class="cal-view-tab" onclick="setCalView('day',this)">Day</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>

      <!-- ROW 2: Job Posts + Pending Actions -->
      <div class="grid-wide">
        <div class="table-wrap">
          <div class="table-header">
            <span class="table-title">Recent Job Posts</span>
            <a href="/mss-career-portal/hr/jobpost-list" class="action-link">View All →</a>
          </div>
          <table id="jobTable"></table>
        </div>

        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Pending Actions</span>
            <span class="badge badge-red">5 items</span>
          </div>
          <div class="card-body" id="pendingList"></div>
        </div>
      </div>

      <!-- ROW 3: Recent Applicants -->
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-title">Recent Applicants</span>
          <a href="/mss-career-portal/hr/jobapplicants-list" class="action-link">View All →</a>
        </div>
        <table id="applicantTable"></table>
      </div>

    </div><!-- /page-content -->
  </div><!-- /page-shell -->

  <!-- portal-layout.js: must match your actual file path -->
  <script src="portal-layout.js"></script>
  <script>
    var token = localStorage.getItem('access_token');
    var JOBS_API_BASE = window.AUTH_API_BASE || 'http://192.168.0.12:8000';

    /* ── HELPERS ─────────────────────────────────────────────────── */
    function statusBadge(s) {
      const map = { Active: 'badge-green', Draft: 'badge-amber', Closed: 'badge-red', 'On Hold': 'badge-purple' };
      return `<span class="badge ${map[s] || 'badge-blue'}">${s}</span>`;
    }
    function stageBadge(s) {
      const map = { Applied: 'badge-teal', Screened: 'badge-blue', Interview: 'badge-amber', Offer: 'badge-purple', Onboarding: 'badge-green' };
      return `<span class="badge ${map[s] || 'badge-blue'}">${s}</span>`;
    }

    /* ── MODAL ───────────────────────────────────────────────────── */
    function showModal(html) {
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modalOverlay').classList.add('is-open');
    }
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('is-open');
    }
    document.getElementById('modalOverlay').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

    /* ── DYNAMIC CALENDAR ───────────────────────────────────────── */
    let curMonth = new Date().getMonth(), curYear = new Date().getFullYear();
    let curView = 'month'; // 'month', 'week', 'day'
    let selectedDate = new Date();
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    
    let allInterviews = [];

    // Fetch interviews globally
    if (token) {
      fetch(JOBS_API_BASE + '/hr/interviews', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => res.json())
      .then(data => {
        allInterviews = data.interviews || [];
        renderCal(); // re-render once we have data
      })
      .catch(err => console.error("Error fetching interviews for calendar", err));
    }

    function renderCal() {
      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';
      
      if (curView === 'month') {
        document.getElementById('calTitle').textContent = `${monthNames[curMonth]} ${curYear}`;
        grid.style.display = 'grid';
        grid.style.gridTemplateColumns = 'repeat(7, 1fr)';
        grid.style.flexDirection = '';
        grid.style.gap = '6px';
        
        ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].forEach(d => {
          const el = document.createElement('div');
          el.className = 'cal-dayname';
          el.textContent = d;
          grid.appendChild(el);
        });
        
        const firstDay = new Date(curYear, curMonth, 1).getDay();
        const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
        const prevDays = new Date(curYear, curMonth, 0).getDate();
        
        for (let i = firstDay - 1; i >= 0; i--) {
          const el = document.createElement('div');
          el.className = 'cal-day other-month';
          el.textContent = prevDays - i;
          grid.appendChild(el);
        }
        for (let d = 1; d <= daysInMonth; d++) {
          const isToday = new Date().getDate() === d && new Date().getMonth() === curMonth && new Date().getFullYear() === curYear;
          
          const dayEvents = allInterviews.filter(ev => {
            const evD = new Date(ev.date);
            return evD.getDate() === d && evD.getMonth() === curMonth && evD.getFullYear() === curYear;
          });
          const hasEv = dayEvents.length > 0;
          
          const el = document.createElement('div');
          el.className = 'cal-day' + (isToday ? ' today' : '') + (hasEv ? ' has-event' : '');
          
          if (hasEv) {
            const evText = dayEvents.length === 1 ? dayEvents[0].candidate.split(' ')[0] : dayEvents.length + ' Interviews';
            el.innerHTML = `<span style="font-weight:${isToday ? '700' : '500'};">${d}</span><div style="font-size:9px; color:var(--amber-mid); margin-top:2px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; padding:0 2px; font-weight:600;">${evText}</div>`;
            el.onclick = () => showDayEvents(d, curMonth, curYear);
          } else {
            el.innerHTML = `<span style="font-weight:${isToday ? '700' : '500'};">${d}</span>`;
          }
          grid.appendChild(el);
        }
      } else if (curView === 'week') {
        const startOfWeek = new Date(selectedDate);
        startOfWeek.setDate(selectedDate.getDate() - selectedDate.getDay());
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);
        
        document.getElementById('calTitle').textContent = `${startOfWeek.getDate()} ${monthNames[startOfWeek.getMonth()]} - ${endOfWeek.getDate()} ${monthNames[endOfWeek.getMonth()]} ${startOfWeek.getFullYear()}`;
        
        grid.style.display = 'flex';
        grid.style.flexDirection = 'column';
        grid.style.gap = '8px';
        
        for(let i=0; i<7; i++) {
          const d = new Date(startOfWeek);
          d.setDate(d.getDate() + i);
          
          const dayEvents = allInterviews.filter(ev => {
            const evD = new Date(ev.date);
            return evD.getDate() === d.getDate() && evD.getMonth() === d.getMonth() && evD.getFullYear() === d.getFullYear();
          });
          
          const row = document.createElement('div');
          row.style.display = 'flex';
          row.style.background = 'var(--bg1)';
          row.style.border = '1px solid var(--border)';
          row.style.borderRadius = 'var(--radius-sm)';
          row.style.padding = '10px';
          
          const dateBox = document.createElement('div');
          dateBox.style.width = '60px';
          dateBox.style.textAlign = 'center';
          dateBox.style.borderRight = '1px solid var(--border)';
          dateBox.style.paddingRight = '10px';
          dateBox.style.marginRight = '10px';
          dateBox.innerHTML = `<div style="font-size:12px;color:var(--text3)">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]}</div><div style="font-size:18px;font-weight:600;color:var(--text1)">${d.getDate()}</div>`;
          row.appendChild(dateBox);
          
          const evBox = document.createElement('div');
          evBox.style.flex = '1';
          if(dayEvents.length === 0) {
             evBox.innerHTML = '<div style="color:var(--text3);font-size:12px;margin-top:10px;">No interviews scheduled</div>';
          } else {
             evBox.innerHTML = dayEvents.map(ev => `<div style="background:var(--blue-light);color:var(--blue-dark);padding:6px 10px;border-radius:4px;margin-bottom:4px;font-size:12px;"><b>${ev.time}</b> &middot; ${ev.candidate} (${ev.position})</div>`).join('');
          }
          row.appendChild(evBox);
          grid.appendChild(row);
        }
        
      } else if (curView === 'day') {
        document.getElementById('calTitle').textContent = `${selectedDate.getDate()} ${monthNames[selectedDate.getMonth()]} ${selectedDate.getFullYear()}`;
        
        grid.style.display = 'flex';
        grid.style.flexDirection = 'column';
        grid.style.gap = '8px';
        
        const dayEvents = allInterviews.filter(ev => {
          const evD = new Date(ev.date);
          return evD.getDate() === selectedDate.getDate() && evD.getMonth() === selectedDate.getMonth() && evD.getFullYear() === selectedDate.getFullYear();
        });
        
        if(dayEvents.length === 0) {
          grid.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);">No interviews scheduled for this day.</div>';
        } else {
          grid.innerHTML = dayEvents.map(ev => `
            <div style="background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;">
               <div style="font-weight:600;font-size:14px;color:var(--text1)">${ev.time} &middot; ${ev.candidate}</div>
               <div style="font-size:12px;color:var(--text2);margin-top:4px;">${ev.position} &middot; ${ev.round || 'Interview'}</div>
               <div style="font-size:12px;color:var(--blue);margin-top:4px;"><i class="ti ti-${ev.mode === 'in-person' ? 'building' : 'video'}" aria-hidden="true"></i> ${ev.mode || 'Online'}</div>
            </div>
          `).join('');
        }
      }
    }

    function changeMonth(dir) {
      if (curView === 'month') {
        curMonth += dir;
        if (curMonth > 11) { curMonth = 0; curYear++; }
        if (curMonth < 0) { curMonth = 11; curYear--; }
        selectedDate.setMonth(curMonth);
        selectedDate.setFullYear(curYear);
      } else if (curView === 'week') {
        selectedDate.setDate(selectedDate.getDate() + (dir * 7));
      } else if (curView === 'day') {
        selectedDate.setDate(selectedDate.getDate() + dir);
      }
      renderCal();
    }

    function setCalView(v, el) {
      document.querySelectorAll('.cal-view-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      curView = v;
      if (v === 'month') {
         curMonth = selectedDate.getMonth();
         curYear = selectedDate.getFullYear();
      }
      renderCal();
    }

    function showDayEvents(d, m, y) {
      const dayEvents = allInterviews.filter(ev => {
         const evD = new Date(ev.date);
         return evD.getDate() === d && evD.getMonth() === m && evD.getFullYear() === y;
      });
      const htmlEvents = dayEvents.map(ev => `
        <div class="modal-event">
          <div class="modal-event-name">${ev.candidate}</div>
          <div class="modal-event-meta">${ev.position} &middot; ${ev.round || 'Interview'} &middot; ${ev.time}</div>
          <div class="modal-event-link"><i class="ti ti-${ev.mode === 'in-person' ? 'building' : 'video'}" aria-hidden="true"></i> ${ev.mode || 'Online'}</div>
        </div>
      `).join('');

      showModal(`
        <div class="modal-title"><i class="ti ti-calendar" aria-hidden="true"></i> Interviews – ${monthNames[m]} ${d}, ${y}</div>
        ${htmlEvents}
      `);
    }
    renderCal();

    /* ── DYNAMIC DATA FETCHING ────────────────────────────────────── */
    if (token) {
        // 1. Fetch Stats & Funnel Data
        fetch(JOBS_API_BASE + '/jobs/dashboard/stats', {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        })
        .then(res => {
            if (!res.ok) throw new Error('Failed to load stats');
            return res.json();
        })
        .then(data => {
            // Render Stats
            const stats = [
              { label: 'Active Jobs', value: data.active_jobs, icon: '<i class="ti ti-briefcase" aria-hidden="true"></i>', color: '#185FA5', bg: '#E6F1FB', url: '/mss-career-portal/hr/jobpost-list?status=active' },
              { label: 'Total Applicants', value: data.total_applicants, icon: '<i class="ti ti-users" aria-hidden="true"></i>', color: '#3B6D11', bg: '#EAF3DE', url: '/mss-career-portal/hr/jobapplicants-list' },
              { label: 'Scheduled Interviews', value: data.scheduled_interviews, icon: '<i class="ti ti-calendar" aria-hidden="true"></i>', color: '#993C1D', bg: '#FAECE7', url: '/mss-career-portal/hr/interviews' },
              { label: 'MASSET Sync Pending', value: data.masset_sync_pending, icon: '<i class="ti ti-refresh" aria-hidden="true"></i>', color: '#0C447C', bg: '#B5D4F4', url: '/mss-career-portal/hr/masset-candidates' },
              { label: 'Onboarded Candidates', value: data.onboarded_candidates, icon: '<i class="ti ti-school" aria-hidden="true"></i>', color: '#0F6E56', bg: '#9FE1CB', url: '/mss-career-portal/hr/masset-candidates?status=onboarded' },
            ];

            const sg = document.getElementById('statGrid');
            sg.innerHTML = '';
            stats.forEach(s => {
              const d = document.createElement('div');
              d.className = 'stat-card';
              d.style.setProperty('--card-accent', s.color);
              d.innerHTML = `
                <div class="stat-icon" style="background:${s.bg};color:${s.color};">${s.icon}</div>
                <div class="stat-value" style="color:${s.color};">${s.value}</div>
                <div class="stat-label">${s.label}</div>`;
              d.onclick = () => location.href = s.url;
              sg.appendChild(d);
            });

            // Render Funnel
            const funnelEl = document.getElementById('funnelChart');
            funnelEl.innerHTML = '';
            const maxVal = data.total_applicants || 1;
            data.funnel.forEach(f => {
              const pct = Math.round(f.count / maxVal * 100);
              const row = document.createElement('div');
              row.className = 'funnel-row';
              row.innerHTML = `
                <div class="funnel-label">${f.stage}</div>
                <div class="funnel-bar-bg">
                  <div class="funnel-bar-fill" data-fill style="background:${f.color}; width: 0%;" data-pct="${pct}">${f.count}</div>
                </div>
                <div class="funnel-pct">${pct}%</div>`;
              funnelEl.appendChild(row);
            });
            
            requestAnimationFrame(() => {
              setTimeout(() => {
                document.querySelectorAll('[data-fill]').forEach(el => {
                  el.style.width = el.dataset.pct + '%';
                });
              }, 200);
            });
        })
        .catch(err => console.error('Error loading stats:', err));

        // 2. Fetch Recent Job Posts
        fetch(JOBS_API_BASE + '/jobs/', {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        })
        .then(res => {
            if (!res.ok) throw new Error('Failed to load jobs');
            return res.json();
        })
        .then(jobs => {
            const jobTable = document.getElementById('jobTable');
            jobTable.innerHTML = `<thead><tr>
              <th>Job Title</th><th>Department</th><th>Location</th>
              <th style="text-align:center;">Vacancies</th><th>Status</th>
              <th>Published</th><th></th>
            </tr></thead>`;
            const jBody = document.createElement('tbody');
            
            if (!jobs || jobs.length === 0) {
                jBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No job posts created yet.</td></tr>';
            } else {
                jobs.slice(0, 5).forEach(j => {
                  const tr = document.createElement('tr');
                  const pubDate = j.start_date ? new Date(j.start_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';
                  const statusLabel = j.job_status === 'publish' ? 'Active' : (j.job_status === 'draft' ? 'Draft' : 'Closed');
                  
                  tr.innerHTML = `
                    <td><div class="td-name">${j.job_title}</div></td>
                    <td class="td-muted">${j.department || '—'}</td>
                    <td>${j.school_name || 'Chetpet'}</td>
                    <td style="text-align:center;font-weight:700;">${j.vacancy_count || 1}</td>
                    <td>${statusBadge(statusLabel)}</td>
                    <td class="td-muted">${pubDate}</td>
                    <td><a class="action-link" onclick="event.stopPropagation();location.href='/mss-career-portal/hr/jobpost-details?id=${j.job_id}'">View</a></td>`;
                  tr.onclick = () => location.href = '/mss-career-portal/hr/jobpost-details?id=' + j.job_id;
                  jBody.appendChild(tr);
                });
            }
            jobTable.appendChild(jBody);
        })
        .catch(err => console.error('Error loading jobs:', err));

        // 3. Fetch Recent Applicants
        fetch(JOBS_API_BASE + '/jobs/dashboard/recent-applicants', {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        })
        .then(res => {
            if (!res.ok) throw new Error('Failed to load recent applicants');
            return res.json();
        })
        .then(applicants => {
            const appTable = document.getElementById('applicantTable');
            appTable.innerHTML = `<thead><tr>
              <th>Candidate</th><th>Applied Job</th><th>Experience</th>
              <th>Stage</th><th>Interview Status</th><th></th>
            </tr></thead>`;
            const aBody = document.createElement('tbody');
            
            if (!applicants || applicants.length === 0) {
                aBody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No applications received yet.</td></tr>';
            } else {
                applicants.forEach(c => {
                  const tr = document.createElement('tr');
                  tr.innerHTML = `
                    <td>
                      <div class="td-flex">
                        <div class="avatar-sm" style="background:${c.color};">${c.initials}</div>
                        <div class="td-name">${c.name}</div>
                      </div>
                    </td>
                    <td class="td-muted">${c.job}</td>
                    <td>${c.exp}</td>
                    <td>${stageBadge(c.stage)}</td>
                    <td class="td-muted">${c.interviewStatus}</td>
                    <td><a class="action-link" onclick="event.stopPropagation();location.href='/mss-career-portal/hr/candidate-profile?applicant_id=${c.job_applicant_id}'">Profile</a></td>`;
                  tr.onclick = () => location.href = '/mss-career-portal/hr/candidate-profile?applicant_id=' + c.job_applicant_id;
                  aBody.appendChild(tr);
                });
            }
            appTable.appendChild(aBody);
        })
        .catch(err => console.error('Error loading applicants:', err));
    }

    /* ── PENDING ACTIONS ─────────────────────────────────────────── */
    function loadPendingActions() {
      fetch(AUTH_API_BASE + '/hr/pending-actions', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      })
      .then(r => r.json())
      .then(data => {
        const pendingActions = [
          { icon: '<i class="ti ti-clipboard-list" aria-hidden="true"></i>', iconBg: '#E6F1FB', title: 'Pre-Screen Review', desc: data.pre_screen_count + ' applications pending review', url: '/mss-career-portal/hr/jobapplicants-list', count: data.pre_screen_count, countBg: '#378ADD' },
          { icon: '<i class="ti ti-calendar-event" aria-hidden="true"></i>', iconBg: '#FEF4E6', title: 'Upcoming Interviews', desc: data.interviews_count + ' interviews scheduled', url: '/mss-career-portal/hr/interviews', count: data.interviews_count, countBg: '#F59E0B' },
          { icon: '<i class="ti ti-refresh" aria-hidden="true"></i>', iconBg: '#E8E8E8', title: 'MASSET Sync', desc: data.masset_sync_count + ' profiles need syncing', url: '/mss-career-portal/hr/masset-candidates', count: data.masset_sync_count, countBg: '#6B7280' }
        ];
        const pendingEl = document.getElementById('pendingList');
        pendingEl.innerHTML = '';
        pendingActions.forEach(a => {
          const div = document.createElement('div');
          div.className = 'pending-item';
          div.innerHTML = `
        <div class="pending-icon" style="background:${a.iconBg};">${a.icon}</div>
        <div>
          <div class="pending-title">${a.title}</div>
          <div class="pending-desc">${a.desc}</div>
        </div>
        <div class="pending-count" style="background:${a.countBg};">${a.count}</div>`;
          div.onclick = () => location.href = a.url;
          pendingEl.appendChild(div);
        });
      })
      .catch(console.error);
    }
    loadPendingActions();
  </script>
</body>

</html>
