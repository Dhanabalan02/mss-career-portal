<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Job Applicants – TMSS Career</title>
<link rel="icon" href="images/mss-logo.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal-layout.css">
<script src="portal-layout.js" defer></script>
<style>
/* ════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════ */
:root {
  --bg:          #ffffff;
  --bg2:         #f8f8f6;
  --bg3:         #f1efe8;
  --surface:     #ffffff;
  --border:      rgba(0,0,0,0.09);
  --border2:     rgba(0,0,0,0.14);
  --text1:       #1a1a18;
  --text2:       #444441;
  --text3:       #888780;
  --accent:      #534AB7;
  --accent2:     #3C3489;
  --green:       #3B6D11;
  --green-bg:    #EAF3DE;
  --green-text:  #27500A;
  --amber:       #BA7517;
  --amber-bg:    #FAEEDA;
  --amber-text:  #633806;
  --red:         #A32D2D;
  --red-bg:      #FCEBEB;
  --red-text:    #791F1F;
  --purple-bg:   #EEEDFE;
  --purple-text: #3C3489;
  --teal:        #0F6E56;
  --teal-bg:     #E1F5EE;
  --teal-text:   #085041;
  --shadow:      0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:   0 4px 12px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.04);
  --radius:      10px;
  --radius-lg:   14px;
}

/* Dark mode — triggered by portal-layout.js via body.dark-theme */
[data-theme="dark"],
body.dark-theme {
  --bg:          #0d0d0d;
  --bg2:         #111111;
  --bg3:         #181818;
  --surface:     #0d0d0d;
  --border:      rgba(255,255,255,0.10);
  --border2:     rgba(255,255,255,0.16);
  --text1:       #f0efe8;
  --text2:       #b4b2a9;
  --text3:       #666560;
  --shadow:      0 1px 3px rgba(0,0,0,0.4);
  --shadow-md:   0 4px 12px rgba(0,0,0,0.5);
  --purple-bg:   #26215C;
  --purple-text: #CECBF6;
  --green-bg:    #173404;
  --green-text:  #C0DD97;
  --amber-bg:    #412402;
  --amber-text:  #FAC775;
  --red-bg:      #501313;
  --red-text:    #F7C1C1;
  --teal-bg:     #04342C;
  --teal-text:   #9FE1CB;
}

/* ════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text1);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ════════════════════════════════════════
   PAGE SHELL
════════════════════════════════════════ */
.page-shell {
  transition: padding-left 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── Page header ── */
.page-header {
  background: var(--surface);
  border-bottom: 0.5px solid var(--border2);
  padding: 15px 26px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 50;
}
.page-title {
  font-family: 'Sora', sans-serif;
  font-size: 19px; font-weight: 700; color: var(--text1);
}
.page-subtitle { font-size: 12.5px; color: var(--text3); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 9px; }
.header-btn {
  padding: 8px 15px;
  border: 0.5px solid var(--border2);
  background: var(--surface); color: var(--text1);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.15s;
}
.header-btn:hover { background: var(--bg3); }

/* ── Content padding ── */
.page-content {
  padding: 22px 24px 64px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* ── Stats row ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(168px, 1fr));
  gap: 14px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-top: 3px solid transparent;
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  transition: transform .2s cubic-bezier(.4,0,.2,1), box-shadow .2s cubic-bezier(.4,0,.2,1);
  position: relative;
  overflow: hidden;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.stat-card .stat-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-bottom: 12px;
}
.stat-card .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -.5px; line-height: 1; margin-bottom: 5px; color: var(--text1); }
.stat-card .stat-label { font-size: 12.5px; color: var(--text3); font-weight: 400; }
.stat-card .stat-delta { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* Color variants */
.stat-card.sc-total    { border-top-color: var(--accent); }
.stat-card.sc-total    .stat-icon { background: var(--purple-bg); color: var(--accent); }
.stat-card.sc-interview { border-top-color: var(--amber); }
.stat-card.sc-interview .stat-icon { background: var(--amber-bg); color: var(--amber); }
.stat-card.sc-offers   { border-top-color: var(--green); }
.stat-card.sc-offers   .stat-icon { background: var(--green-bg); color: var(--green); }
.stat-card.sc-onboarding { border-top-color: var(--teal); }
.stat-card.sc-onboarding .stat-icon { background: var(--teal-bg); color: var(--teal); }

/* ── Filters bar ── */
.filters-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.search-input {
  flex: 1;
  min-width: 180px;
  padding: 9px 14px;
  border: 0.5px solid var(--border2); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13.5px;
  background: var(--surface); color: var(--text1);
  outline: none; transition: border-color 0.15s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--accent); }
.filter-select {
  padding: 9px 12px;
  border: 0.5px solid var(--border2); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  background: var(--surface); color: var(--text1);
  outline: none; cursor: pointer;
  transition: border-color 0.15s;
  min-width: 140px;
}
.filter-select:focus { border-color: var(--accent); }

/* ── Stage chips ── */
.stage-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.stage-chip {
  padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  border: 1px solid transparent;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
}
.chip-count { padding: 1px 6px; border-radius: 10px; font-size: 11px; }

/* ── Table ── */
.table-wrap {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
  padding: 13px 18px;
  border-bottom: 0.5px solid var(--border);
  background: var(--surface);
}

.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.table-title { font-family:'Sora',sans-serif; font-size:14px; font-weight:700; color:var(--text1); }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: var(--bg2); border-bottom: 0.5px solid var(--border2); }
th {
  padding: 11px 16px; text-align: left;
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--text3); white-space: nowrap;
}
td {
  padding: 13px 16px; color: var(--text1);
  border-bottom: 0.5px solid var(--border);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr { cursor: pointer; transition: background 0.12s; }
tbody tr:hover { background: var(--bg2); }

.td-flex { display: flex; align-items: center; gap: 10px; }
.avatar-sm {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.candidate-name { font-weight: 600; font-size: 13.5px; color: var(--text1); }
.candidate-id   { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* ── Stage badges ── */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11.5px; font-weight: 600; white-space: nowrap;
}
.badge-applied    { background: var(--purple-bg); color: var(--purple-text); }
.badge-screened   { background: #E6F1FB; color: #0C447C; }
.badge-interview  { background: var(--amber-bg);  color: var(--amber-text); }
.badge-offer      { background: #EEEDFE; color: #3C3489; }
.badge-accepted   { background: var(--green-bg);  color: var(--green-text); }
.badge-onboarding { background: var(--teal-bg);   color: var(--teal-text); }
.badge-rejected   { background: var(--red-bg);    color: var(--red-text); }

[data-theme="dark"] .badge-applied,    body.dark-theme .badge-applied    { background:#26215C; color:#CECBF6; }
[data-theme="dark"] .badge-screened,   body.dark-theme .badge-screened   { background:#042C53; color:#85B7EB; }
[data-theme="dark"] .badge-interview,  body.dark-theme .badge-interview  { background:#412402; color:#FAC775; }
[data-theme="dark"] .badge-offer,      body.dark-theme .badge-offer      { background:#26215C; color:#CECBF6; }
[data-theme="dark"] .badge-accepted,   body.dark-theme .badge-accepted   { background:#173404; color:#C0DD97; }
[data-theme="dark"] .badge-onboarding, body.dark-theme .badge-onboarding { background:#04342C; color:#9FE1CB; }
[data-theme="dark"] .badge-rejected,   body.dark-theme .badge-rejected   { background:#501313; color:#F7C1C1; }

/* ── Interview status ── */
.interview-status { display: flex; align-items: center; gap: 5px; font-size: 13px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-scheduled { color: var(--amber); }
.status-scheduled .status-dot { background: var(--amber); }
.status-completed { color: var(--teal); }
.status-completed .status-dot { background: var(--teal); }
.status-pending   { color: var(--text3); }
.status-pending   .status-dot { background: var(--text3); }

/* ── Action buttons ── */
.action-btn {
  padding: 5px 12px; border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 0.5px solid transparent;
  transition: opacity 0.15s;
}
.action-btn:hover { opacity: 0.82; }
.action-btn.blue  { background: #E6F1FB; color: #0C447C; border-color: #B5D4F4; }
.action-btn.green { background: var(--green-bg); color: var(--green-text); border-color: #C0DD97; }
.action-btn.red   { background: var(--red-bg);   color: var(--red-text);   border-color: #F7C1C1; }

[data-theme="dark"] .action-btn.blue,  body.dark-theme .action-btn.blue  { background:#042C53; color:#85B7EB; border-color:#0C447C; }
[data-theme="dark"] .action-btn.green, body.dark-theme .action-btn.green { background:#173404; color:#C0DD97; border-color:#3B6D11; }
[data-theme="dark"] .action-btn.red,   body.dark-theme .action-btn.red   { background:#501313; color:#F7C1C1; border-color:#791F1F; }

.checkbox { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }

/* ── Pagination ── */
.pagination {
  display: flex; align-items: center; gap: 4px;
  padding: 13px 18px;
  border-top: 0.5px solid var(--border); background: var(--bg2);
}
.page-btn {
  min-width: 32px; height: 32px; padding: 0 10px;
  border: 0.5px solid var(--border2);
  background: var(--surface); color: var(--text1);
  border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.page-btn:hover { background: var(--bg3); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Modals ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 999;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-box {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 28px; width: 100%; max-width: 500px;
  box-shadow: var(--shadow-md);
}
.modal-title {
  font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700;
  color: var(--text1); margin-bottom: 16px;
}
.modal-overlay p { color: var(--text2); margin-bottom: 16px; font-size: 14px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.span2 { grid-column: span 2; }
.form-group label { font-size: 11.5px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
.form-group input,
.form-group select,
.form-group textarea {
  padding: 9px 12px;
  border: 0.5px solid var(--border2); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  background: var(--surface); color: var(--text1);
  outline: none; transition: border-color 0.15s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 80px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-primary {
  padding: 9px 20px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.btn-primary:hover { background: var(--accent2); }
.btn-danger {
  padding: 9px 20px; background: var(--red); color: #fff;
  border: none; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-danger:hover { opacity: 0.88; }

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */
@media (max-width: 720px) {
  .stats-row {
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .page-content {
    padding: 16px 16px 56px;
  }

  .page-header {
    padding: 14px 16px;
  }

  .filters-bar {
    flex-direction: column;
    align-items: stretch;
  }

  .search-input,
  .filter-select {
    width: 100%;
    min-width: 0;
  }

  .form-grid {
    grid-template-columns: 1fr;
  }

  .form-group.span2 {
    grid-column: span 1;
  }

  .table-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .pagination {
    flex-wrap: wrap;
    justify-content: center;
  }
}

@media (max-width: 460px) {
  .stats-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="page-shell">

  <!-- Page header -->
  <header class="page-header">
    <div>
      <div class="page-title">Job Applicants</div>
      <div class="page-subtitle">247 total candidates across all positions</div>
    </div>
  </header>

  <!-- Page content -->
  <div class="page-content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card sc-total">
        <div class="stat-icon"><i class="ti ti-users" aria-hidden="true"></i></div>
        <div class="stat-value">0</div>
        <div class="stat-label">Total Applicants</div>
        <div class="stat-delta"></div>
      </div>
      <div class="stat-card sc-interview">
        <div class="stat-icon"><i class="ti ti-calendar-event" aria-hidden="true"></i></div>
        <div class="stat-value">0</div>
        <div class="stat-label">In Interview</div>
        <div class="stat-delta"></div>
      </div>
      <div class="stat-card sc-offers">
        <div class="stat-icon"><i class="ti ti-send" aria-hidden="true"></i></div>
        <div class="stat-value">0</div>
        <div class="stat-label">Offers</div>
        <div class="stat-delta"></div>
      </div>
      <div class="stat-card sc-onboarding">
        <div class="stat-icon"><i class="ti ti-school" aria-hidden="true"></i></div>
        <div class="stat-value">0</div>
        <div class="stat-label">Onboarding</div>
        <div class="stat-delta"></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input class="search-input" type="text" id="searchInput"
             placeholder="Search candidates…" oninput="filterApplicants()">
      <select class="filter-select" id="fJob" onchange="filterApplicants()">
        <option value="">All Job Posts</option>
      </select>
      <select class="filter-select" id="fStage" onchange="filterApplicants()">
        <option value="">All Stages</option>
        <option>Applied</option>
        <option>Screened</option>
        <option>Interview</option>
        <option>Awaiting Offer</option>
        <option>Offer Accepted</option>
        <option>Onboarding</option>
        <option>Rejected</option>
      </select>
      <select class="filter-select" id="fExp" onchange="filterApplicants()">
        <option value="">All Experience</option>
        <option>0-3 yrs</option>
        <option>3-6 yrs</option>
        <option>6-10 yrs</option>
        <option>10+ yrs</option>
      </select>
    </div>

    <!-- Stage chips -->
    <div class="stage-chips" id="stageChips"></div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="table-title">All Applicants</span>
          <span id="selectedCount" style="font-size:12px;color:var(--text3);"></span>
        </div>
        <span id="resultCount" style="font-size:12px;color:var(--text3);">247 candidates</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>SI NO</th>
              <th>Candidate</th>
              <th>Applied For</th>
              <th>Applied Date</th>
              <th>Experience</th>
              <th>Current Stage</th>
              <th>Interview Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="applicantBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

  </div><!-- /page-content -->
</div><!-- /page-shell -->

<!-- ══════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════ -->
<script>
/* ── School admin nav (portal-layout.js) ── */
localStorage.setItem('userRole', 'schoolAdmin');

const API_BASE = window.API_BASE || window.AUTH_API_BASE || 'http://127.0.0.1:8000';
const _token = () => localStorage.getItem('access_token') || '';

/* ── Candidate data (merged from original source) ── */
let CANDIDATES = [];

/* ── Stage chip config ── */
let STAGE_CONFIG = [
  { name:'Applied',        count:0, color:'#534AB7', bg:'#EEEDFE' },
  { name:'Screened',       count:0, color:'#185FA5', bg:'#E6F1FB' },
  { name:'Interview',      count:0, color:'#BA7517', bg:'#FAEEDA' },
  { name:'Offer',          count:0, color:'#534AB7', bg:'#EEEDFE' },
  { name:'Offer Accepted', count:0, color:'#3B6D11', bg:'#EAF3DE' },
  { name:'Onboarding',     count:0, color:'#0F6E56', bg:'#E1F5EE' },
  { name:'Rejected',       count:0, color:'#A32D2D', bg:'#FCEBEB' },
];

let activeStageFilter = '';

/* ── Build stage chips ── */
function renderChips() {
  const chipsEl = document.getElementById('stageChips');
  chipsEl.innerHTML = '';
  STAGE_CONFIG.forEach(s => {
    const chip = document.createElement('button');
    chip.className = 'stage-chip' + (activeStageFilter === s.name ? ' active' : '');
    chip.dataset.stage = s.name;
    chip.style.cssText = `background:${s.bg};color:${s.color};border-color:${s.color}30;`;
    if (activeStageFilter === s.name) chip.style.outline = `2px solid ${s.color}`;
    chip.innerHTML = `${s.name}<span class="chip-count" style="background:${s.color}25;color:${s.color};">${s.count}</span>`;
    chip.onclick = () => {
      activeStageFilter = activeStageFilter === s.name ? '' : s.name;
      document.getElementById('fStage').value = activeStageFilter;
      renderChips();
      filterApplicants();
    };
    chipsEl.appendChild(chip);
  });
}
renderChips();

/* ── Helpers ── */
function stageBadge(stage) {
  const map = {
    'Applied':'badge-applied', 'Screened':'badge-screened', 'Interview':'badge-interview',
    'Offer':'badge-offer', 'Offer Accepted':'badge-accepted',
    'Onboarding':'badge-onboarding', 'Rejected':'badge-rejected'
  };
  return `<span class="badge ${map[stage] || ''}">${stage}</span>`;
}

function interviewStatusHtml(s) {
  if (s === 'Scheduled') return `<span class="interview-status status-scheduled"><span class="status-dot"></span>Scheduled</span>`;
  if (s === 'Completed') return `<span class="interview-status status-completed"><span class="status-dot"></span>Completed</span>`;
  if (s === 'Pending')   return `<span class="interview-status status-pending"><span class="status-dot"></span>Pending</span>`;
  return `<span style="color:var(--text3);">—</span>`;
}

function avatarGradient(name) {
  const p = [
    ['#6366f1','#8b5cf6'], ['#3b82f6','#06b6d4'], ['#10b981','#0891b2'],
    ['#f59e0b','#ef4444'], ['#534AB7','#185FA5'], ['#0F6E56','#3B6D11'], ['#BA7517','#A32D2D']
  ];
  return p[name.charCodeAt(0) % p.length].join(',');
}

/* ── Render table ── */
function renderApplicants(list) {
  const tbody = document.getElementById('applicantBody');
  tbody.innerHTML = '';
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3);">No candidates match your filters</td></tr>`;
    document.getElementById('resultCount').textContent = '0 candidates';
    if (typeof buildPagination === 'function') buildPagination(0);
    return;
  }
  list.forEach((c, index) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600;color:var(--text2);"> ${index + 1} </td>
      <td>
        <div class="td-flex">
          <div class="avatar-sm" style="background:linear-gradient(135deg,${avatarGradient(c.name)});">${c.avatar}</div>
          <div>
            <div class="candidate-name">${c.name}</div>
            <div class="candidate-id">APP-${String(c.id).padStart(4,'0')}</div>
          </div>
        </div>
      </td>
      <td style="color:var(--text2);max-width:180px;">${c.job}</td>
      <td style="color:var(--text3);white-space:nowrap;">${c.appliedDate}</td>
      <td style="font-weight:500;">${c.exp}</td>
      <td>${stageBadge(c.stage)}</td>
      <td>${interviewStatusHtml(c.interviewStatus)}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="action-btn blue"  onclick="event.stopPropagation();location.href='/mss-career-portal/school/candidate-profile?id=${c.id}'">Profile</button>
        <!-- ${c.stage!=='Rejected' ? `<button class="action-btn red" onclick="event.stopPropagation();rejectCandidate('${c.name}')">Reject</button>` : ''} -->
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('resultCount').textContent = `${list.length} candidate${list.length !== 1 ? 's' : ''}`;
  if (typeof buildPagination === 'function') buildPagination(list.length);
}

/* ── Filter ── */
function filterApplicants() {
  const q     = document.getElementById('searchInput').value.toLowerCase();
  const job   = document.getElementById('fJob').value;
  const stage = document.getElementById('fStage').value || activeStageFilter;
  const list  = CANDIDATES.filter(c =>
    (!q     || c.name.toLowerCase().includes(q) || c.job.toLowerCase().includes(q)) &&
    (!job   || c.job === job) &&
    (!stage || c.stage === stage)
  );
  renderApplicants(list);
}

/* ── Select all ── */
function toggleAll(cb) {
  document.querySelectorAll('tbody .checkbox').forEach(c => c.checked = cb.checked);
  updateSelected();
}
function updateSelected() {
  const n = document.querySelectorAll('tbody .checkbox:checked').length;
  document.getElementById('selectedCount').textContent = n > 0 ? `(${n} selected)` : '';
}

/* ── Modal helper ── */
function showModal(html) {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal-box">${html}</div>`;
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);
}

/* ── Reject Candidate modal ── */
function rejectCandidate(name) {
  showModal(`
    <div class="modal-title">Reject Candidate</div>
    <p>You are about to reject <strong>${name}</strong> from this position.</p>
    <div class="form-group">
      <label>Rejection Reason *</label>
      <select>
        <option>Does not meet experience requirements</option>
        <option>Qualification mismatch</option>
        <option>Position filled</option>
        <option>Better candidates selected</option>
      </select>
    </div>
    <div class="form-group" style="margin-top:12px;">
      <label>Additional Notes</label>
      <textarea placeholder="Optional feedback…"></textarea>
    </div>
    <div style="margin-top:12px;display:flex;align-items:center;gap:8px;">
      <input type="checkbox" class="checkbox" id="sendEmail">
      <label for="sendEmail" style="font-size:13px;color:var(--text2);cursor:pointer;">Send rejection email to candidate</label>
    </div>
    <div class="modal-actions">
      <button class="header-btn" onclick="document.querySelector('.modal-overlay').remove()">Cancel</button>
      <button class="btn-danger" onclick="document.querySelector('.modal-overlay').remove()">Confirm Rejection</button>
    </div>`);
}

/* ── Export modal ── */
function exportSelected() {
  const n = document.querySelectorAll('tbody .checkbox:checked').length;
  if (!n) { alert('Please select at least one candidate to export.'); return; }
  showModal(`
    <div class="modal-title"><i class="ti ti-upload" aria-hidden="true"></i> Export Applicants</div>
    <p>Exporting <strong>${n} selected candidate${n !== 1 ? 's' : ''}</strong>.</p>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn-primary" style="flex:1;" onclick="document.querySelector('.modal-overlay').remove()"><i class="ti ti-chart-bar" aria-hidden="true"></i> Export as Excel</button>
      <button class="header-btn"  style="flex:1;" onclick="document.querySelector('.modal-overlay').remove()"><i class="ti ti-file-text" aria-hidden="true"></i> Export as CSV</button>
    </div>`);
}

/* ── Load from API ── */
async function loadApplicants() {
  try {
    const res = await fetch(`${API_BASE}/school/applicants`, {
      headers: { Authorization: `Bearer ${_token()}` }
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    CANDIDATES = Array.isArray(data.applicants) ? data.applicants : [];
    
    const totalCount = CANDIDATES.length;
    const interviewCount = CANDIDATES.filter(c => c.stage === 'Interview').length;
    const offersCount = CANDIDATES.filter(c => c.stage === 'Offer' || c.stage === 'Offer Accepted').length;
    const onboardingCount = CANDIDATES.filter(c => c.stage === 'Onboarding').length;

    const scTotalVal = document.querySelector('.sc-total .stat-value');
    const scInterviewVal = document.querySelector('.sc-interview .stat-value');
    const scOffersVal = document.querySelector('.sc-offers .stat-value');
    const scOnboardingVal = document.querySelector('.sc-onboarding .stat-value');

    if (scTotalVal) scTotalVal.textContent = totalCount;
    if (scInterviewVal) scInterviewVal.textContent = interviewCount;
    if (scOffersVal) scOffersVal.textContent = offersCount;
    if (scOnboardingVal) scOnboardingVal.textContent = onboardingCount;
    
    const subtitleEl = document.querySelector('.page-subtitle');
    if (subtitleEl) subtitleEl.textContent = `${totalCount} total candidate${totalCount !== 1 ? 's' : ''} across all positions`;
    
    /* update stage counts */
    STAGE_CONFIG.forEach(sc => sc.count = 0);
    CANDIDATES.forEach(c => {
      const stageObj = STAGE_CONFIG.find(sc => sc.name === c.stage);
      if (stageObj) stageObj.count++;
    });
    renderChips();

    /* fetch jobs for dropdown */
    const jobsRes = await fetch(`${API_BASE}/school/jobs`, {
      headers: { Authorization: `Bearer ${_token()}` }
    });
    const fJob = document.getElementById('fJob');
    if (jobsRes.ok) {
      const jobsData = await jobsRes.json();
      const jobsArray = jobsData.jobs || jobsData; // Support both {jobs: [...]} and [...] 
      if (Array.isArray(jobsArray) && jobsArray.length > 0) {
        fJob.innerHTML = '<option value="">All Job Posts</option>';
        jobsArray.forEach(j => { 
          const o = document.createElement('option'); 
          o.value = j.title || j.job_title; 
          o.textContent = j.title || j.job_title; 
          fJob.appendChild(o); 
        });
      } else {
        fJob.innerHTML = '<option value="" disabled selected>No Job posts</option>';
      }
    } else {
      fJob.innerHTML = '<option value="" disabled selected>No Job posts</option>';
    }
  } catch(e) { 
    console.warn('API unavailable, keeping empty', e); 
    const fJob = document.getElementById('fJob');
    if (fJob && fJob.options.length <= 1) {
      fJob.innerHTML = '<option value="" disabled selected>No Job posts</option>';
    }
  }
  renderApplicants(CANDIDATES);
}

/* ── Pagination ── */
function buildPagination(total, perPage=10) {
  const pg = document.getElementById('pagination');
  if (total === 0) {
    pg.innerHTML = '';
    pg.style.display = 'none';
    return;
  }
  pg.style.display = 'flex';
  const totalPages = Math.ceil(total / perPage) || 1;
  pg.innerHTML = '';
  
  for (let i = 1; i <= totalPages; i++) {
    const b = document.createElement('button');
    b.className = 'page-btn' + (i === 1 ? ' active' : '');
    b.textContent = i;
    b.onclick = function() {
      document.querySelectorAll('.page-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    };
    pg.appendChild(b);
  }
}

/* ── Init ── */
loadApplicants();
</script>
